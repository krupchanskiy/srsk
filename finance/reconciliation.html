<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <script src="../js/color-init.js?v=2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="fin_page_title_reconciliation">Сверка — Финансы — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { screens: { 'desktop': '1200px' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css?v=3">
    <link rel="stylesheet" href="../css/fin.css?v=1">
</head>
<body class="fin-page bg-base-200 min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="container mx-auto px-4 py-6 flex-1">
    <h1 class="text-2xl font-bold mb-6" data-i18n="nav_fin_reconciliation">Сверка</h1>

    <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body py-4">
            <div class="flex flex-wrap items-end gap-4">
                <div class="form-control">
                    <label class="label py-0" for="accountSelect"><span class="label-text" data-i18n="fin_recon_select_account">Выберите счёт</span></label>
                    <select id="accountSelect" class="select select-bordered select-sm w-64"></select>
                </div>
                <div id="accountInfo" class="text-sm opacity-70"></div>
            </div>
        </div>
    </div>

    <!-- Success-состояние после сохранённой сверки (peak-end) -->
    <div id="reconSuccess" class="hidden alert alert-success mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span id="reconSuccessText" class="font-medium"></span>
    </div>

    <!-- Пустое состояние: счёт не выбран -->
    <div id="reconEmpty" class="text-center py-14">
        <div class="fin-icon-chip mx-auto mb-3" style="width:3.5rem;height:3.5rem">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M9 14.25l6-6m4.5-3.493V21.75l-3.75-1.5-3.75 1.5-3.75-1.5-3.75 1.5V4.757c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0c1.1.128 1.907 1.077 1.907 2.185z"/></svg>
        </div>
        <div class="opacity-70" data-i18n="fin_recon_select_hint">Выберите счёт сверху, чтобы начать сверку</div>
    </div>

    <!-- Блок сверки -->
    <div id="reconBlock" class="hidden">
        <div class="card bg-base-100 shadow-sm mb-4">
            <div class="card-body">
                <!-- Наличный пересчёт -->
                <div id="cashBlock" class="hidden">
                    <div id="locations"></div>
                    <button type="button" class="btn btn-ghost btn-sm" onclick="FinRecon.addLocation()" data-permission="fin_admin">
                        + <span data-i18n="fin_recon_add_location">Добавить точку</span>
                    </button>
                </div>

                <!-- Выписка -->
                <div id="statementBlock" class="hidden">
                    <div class="form-control w-64">
                        <label class="label py-0"><span class="label-text" data-i18n="fin_statement_balance">Остаток по выписке</span></label>
                        <input type="number" id="statementBalance" class="input input-bordered input-sm" step="0.01">
                    </div>
                </div>

                <!-- Итоги: расчётный vs фактический, разница крупно -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-4">
                    <div class="rounded-xl border border-base-200 p-3">
                        <div class="fin-kpi-label" data-i18n="fin_system_balance">Расчётный остаток</div>
                        <div class="font-mono font-bold text-lg mt-0.5" id="systemBalance">—</div>
                    </div>
                    <div class="rounded-xl border border-base-200 p-3">
                        <div class="fin-kpi-label" data-i18n="fin_counted_balance">Фактический остаток</div>
                        <div class="font-mono font-bold text-lg mt-0.5" id="countedBalance">—</div>
                    </div>
                    <div class="rounded-xl border-2 border-base-200 p-3" id="differenceTile">
                        <div class="fin-kpi-label" data-i18n="fin_difference">Разница</div>
                        <div class="font-mono font-bold text-xl mt-0.5" id="differenceValue">—</div>
                    </div>
                </div>

                <!-- Расхождение -->
                <div id="mismatchBlock" class="hidden mt-3">
                    <div class="alert alert-warning py-2 mb-2">
                        <span data-i18n="fin_recon_mismatch_note">Расхождение не устранено. Будет создана корректировка — укажите причину.</span>
                    </div>
                    <input type="text" id="adjustmentReason" class="input input-bordered input-sm w-full" data-i18n-placeholder="fin_recon_adjustment_reason">
                </div>

                <div class="flex justify-end mt-4" data-permission="fin_admin">
                    <button class="btn btn-primary btn-sm" id="saveBtn" onclick="FinRecon.save()" data-i18n="fin_recon_save">Сохранить сверку</button>
                </div>
            </div>
        </div>

        <!-- История -->
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body p-0">
                <div class="flex items-center gap-2 px-4 pt-4">
                    <h2 class="card-title text-base" data-i18n="fin_recon_history">История сверок</h2>
                    <span id="reconStreak" class="badge badge-success badge-sm hidden"></span>
                </div>
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead><tr>
                            <th data-i18n="fin_occurred_on">Дата</th>
                            <th data-i18n="fin_performed_by">Кто</th>
                            <th data-i18n="fin_checkpoint">Чекпоинт</th>
                            <th class="text-right" data-i18n="fin_counted_balance">Факт</th>
                            <th class="text-right" data-i18n="fin_difference">Разница</th>
                            <th data-i18n="fin_comment">Комментарий</th>
                        </tr></thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="../js/config.js?v=4"></script>
<script src="../js/auth-check.js?v=7"></script>
<script src="../js/cache.js?v=1"></script>
<script src="../js/utils.js?v=4"></script>
<script src="../js/layout.js?v=25"></script>
<script src="../js/date-utils.js?v=3"></script>
<script src="../js/fin-utils.js?v=6"></script>
<script src="../js/pages/fin-reconciliation.js?v=4"></script>

</body>
</html>
