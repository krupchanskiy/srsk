<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <script src="../js/color-init.js?v=2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="fin_page_title_dds">ДДС — Финансы — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { screens: { 'desktop': '1200px' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css?v=3">
    <link rel="stylesheet" href="../css/fin.css?v=1">
</head>
<body class="fin-page bg-base-200 min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="container mx-auto px-4 py-6 flex-1">
    <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold" data-i18n="nav_fin_dds">ДДС</h1>
            <p class="text-sm opacity-70" data-i18n="fin_dds_full">Движение денежных средств — журнал всех операций</p>
        </div>
        <div class="flex gap-2">
            <button class="btn btn-success btn-sm gap-1" onclick="FinDds.openIncome()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-6 6m6-6l6 6"/></svg>
                <span data-i18n="fin_new_income">Приход</span>
            </button>
            <button class="btn btn-error btn-sm gap-1" onclick="FinDds.openExpense()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m0 0l-6-6m6 6l6-6"/></svg>
                <span data-i18n="fin_new_expense">Расход</span>
            </button>
            <button class="btn btn-primary btn-sm gap-1" onclick="FinDds.openTransfer()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16l-4-4m0 0l4-4m-4 4h18M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                <span data-i18n="fin_new_transfer">Перевод</span>
            </button>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body py-3">
            <!-- Пресеты периода -->
            <div class="flex flex-wrap items-center gap-2 mb-3">
                <span class="text-xs opacity-60" data-i18n="fin_period">Период</span>
                <button class="btn btn-xs btn-ghost" data-preset="today" data-i18n="fin_period_today">Сегодня</button>
                <button class="btn btn-xs btn-ghost" data-preset="week" data-i18n="fin_period_week">Неделя</button>
                <button class="btn btn-xs btn-ghost" data-preset="month" data-i18n="fin_period_month">Месяц</button>
                <button class="btn btn-xs btn-ghost" data-preset="clear" data-i18n="fin_period_all">Всё</button>
                <button class="btn btn-xs btn-ghost ml-auto gap-1" id="ddsCsvBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                    <span data-i18n="fin_export_csv">CSV</span>
                </button>
            </div>
            <div class="flex flex-wrap gap-3 items-end">
                <div class="form-control">
                    <label class="label py-0"><span class="label-text text-xs" data-i18n="fin_account">Счёт</span></label>
                    <select id="filterAccount" class="select select-bordered select-sm w-52"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text text-xs" data-i18n="fin_kind">Тип</span></label>
                    <select id="filterType" class="select select-bordered select-sm w-44"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text text-xs" data-i18n="fin_category">Статья</span></label>
                    <select id="filterCategory" class="select select-bordered select-sm w-44"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text text-xs" data-i18n="fin_status">Статус</span></label>
                    <select id="filterApproval" class="select select-bordered select-sm w-40"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text text-xs" data-i18n="fin_period_from">С</span></label>
                    <input type="date" id="filterFrom" class="input input-bordered input-sm w-40">
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text text-xs" data-i18n="fin_period_to">По</span></label>
                    <input type="date" id="filterTo" class="input input-bordered input-sm w-40">
                </div>
                <div class="form-control flex-1 min-w-48">
                    <label class="label py-0" for="filterSearch"><span class="label-text text-xs" data-i18n="fin_search">Поиск</span></label>
                    <input type="search" id="filterSearch" class="input input-bordered input-sm w-full"
                           data-i18n-placeholder="fin_search_placeholder2" placeholder="Комментарий, плательщик или сумма…">
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица -->
    <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-0">
            <div class="overflow-x-auto">
                <table class="table table-sm">
                    <thead id="ddsHead"></thead>
                    <tbody id="ddsBody">
                        <tr><td colspan="8" class="text-center py-8"><span class="loading loading-spinner loading-md"></span></td></tr>
                    </tbody>
                </table>
            </div>
            <div id="ddsTotals" class="px-4 pt-2 text-sm font-medium"></div>
            <div id="ddsPager" class="px-4 py-2 text-sm flex items-center gap-3"></div>
        </div>
    </div>
</main>

<style>
    /* Развёрнутая операция: строка + панель проводок читаются как единый блок */
    #ddsBody tr.fin-expanded > td {
        background-color: color-mix(in srgb, var(--current-color) 10%, transparent) !important;
    }
    #ddsBody tr[data-op].fin-expanded > td { border-bottom-color: transparent; }

    /* Подсветка свежесозданной операции */
    .fin-new-row { animation: finNewRow 2.5s ease-out; }
    @keyframes finNewRow {
        from { background-color: color-mix(in srgb, var(--current-color) 22%, transparent); }
        to { background-color: transparent; }
    }
    @media (prefers-reduced-motion: reduce) {
        .fin-new-row { animation: none; background-color: color-mix(in srgb, var(--current-color) 12%, transparent); }
    }
</style>

<div id="footer-placeholder"></div>

<!-- Модалка: Расход -->
<dialog id="expenseModal" class="modal">
    <div class="modal-box max-w-2xl">
        <h3 class="font-bold text-lg mb-4" data-i18n="fin_new_expense">Расход</h3>
        <form id="expenseForm">
            <div class="flex gap-3 mb-3">
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_occurred_on">Дата события</span></label>
                    <input type="date" id="expDate" class="input input-bordered input-sm" required>
                </div>
                <div class="form-control flex-1">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_comment">Комментарий</span></label>
                    <input type="text" id="expComment" class="input input-bordered input-sm w-full">
                </div>
            </div>
            <div id="expRows"></div>
            <button type="button" class="btn btn-ghost btn-sm mb-3" onclick="FinDds.addExpenseRow()">+ <span data-i18n="fin_add">Добавить</span></button>
            <div class="form-control mb-3">
                <span class="label-text mb-1" data-i18n="fin_attachments">Вложения</span>
                <div class="flex items-center gap-2 flex-wrap">
                    <label class="btn btn-outline btn-sm gap-1" for="expFiles">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13"/></svg>
                        <span data-i18n="fin_choose_files">Выбрать файлы</span>
                    </label>
                    <span id="expFilesList" class="text-sm opacity-70"></span>
                </div>
                <input type="file" id="expFiles" class="hidden" multiple accept="image/jpeg,image/png,image/webp,application/pdf"
                       onchange="document.getElementById('expFilesList').textContent = [...this.files].map(f => f.name).join(', ')">
            </div>
            <div class="modal-action items-center">
                <span id="expRecap" class="mr-auto text-sm font-semibold"></span>
                <button type="button" class="btn" onclick="document.getElementById('expenseModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-primary" data-i18n="save">Сохранить</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Модалка: Приход / Пожертвование -->
<dialog id="incomeModal" class="modal">
    <div class="modal-box max-w-lg">
        <h3 class="font-bold text-lg mb-4" data-i18n="fin_new_income">Приход</h3>
        <form id="incomeForm">
            <div class="form-control mb-2">
                <label class="label cursor-pointer justify-start gap-3 py-1">
                    <input type="checkbox" id="incIsDonation" class="checkbox checkbox-sm">
                    <span class="label-text" data-i18n="fin_is_donation">Это пожертвование</span>
                </label>
            </div>
            <div class="form-control mb-2 hidden" id="incDonorWrap">
                <label class="label py-0"><span class="label-text" data-i18n="fin_donor">Жертвователь</span></label>
                <input type="text" id="incDonorSearch" class="input input-bordered input-sm" autocomplete="off">
                <input type="hidden" id="incDonorId">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-2">
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_occurred_on">Дата</span></label>
                    <input type="date" id="incDate" class="input input-bordered input-sm" required>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_account">Счёт</span></label>
                    <select id="incAccount" class="select select-bordered select-sm" required></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_amount">Сумма</span></label>
                    <input type="number" id="incAmount" class="input input-bordered input-sm" min="0.01" step="0.01" required>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_category">Статья</span></label>
                    <select id="incCategory" class="select select-bordered select-sm" required></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_retreat_object">Ретрит</span></label>
                    <select id="incObject" class="select select-bordered select-sm"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_channel">Канал</span></label>
                    <select id="incChannel" class="select select-bordered select-sm"></select>
                </div>
            </div>
            <div class="form-control mb-2">
                <label class="label py-0"><span class="label-text" data-i18n="fin_comment">Комментарий</span></label>
                <input type="text" id="incComment" class="input input-bordered input-sm">
            </div>
            <div class="modal-action">
                <button type="button" class="btn" onclick="document.getElementById('incomeModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-primary" data-i18n="save">Сохранить</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Модалка: правка аналитики -->
<dialog id="analyticsModal" class="modal">
    <div class="modal-box max-w-md">
        <h3 class="font-bold text-lg mb-2" data-i18n="fin_edit_analytics">Изменить аналитику</h3>
        <div class="text-sm opacity-70 mb-3" id="anInfo"></div>
        <form id="analyticsForm">
            <input type="hidden" id="anPostingId">
            <input type="hidden" id="anHash">
            <div class="grid grid-cols-2 gap-3 mb-2">
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_category">Статья</span></label>
                    <select id="anCategory" class="select select-bordered select-sm" required></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_cost_center">Центр затрат</span></label>
                    <select id="anCc" class="select select-bordered select-sm"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_retreat_object">Ретрит</span></label>
                    <select id="anObject" class="select select-bordered select-sm"></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_contractor">Контрагент</span></label>
                    <select id="anContractor" class="select select-bordered select-sm"></select>
                </div>
                <div class="form-control col-span-2">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_reason">Причина</span></label>
                    <input type="text" id="anReason" class="input input-bordered input-sm">
                </div>
            </div>
            <div class="modal-action">
                <button type="button" class="btn" onclick="document.getElementById('analyticsModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-primary" data-i18n="save">Сохранить</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Модалка: Сторно -->
<dialog id="reversalModal" class="modal">
    <div class="modal-box max-w-sm">
        <h3 class="font-bold text-lg mb-2" data-i18n="fin_reversal">Сторно</h3>
        <div class="text-sm opacity-70 mb-3" id="revInfo"></div>
        <form id="reversalForm">
            <input type="hidden" id="revOpId">
            <div class="form-control mb-2">
                <label class="label py-0"><span class="label-text" data-i18n="fin_reason">Причина</span></label>
                <input type="text" id="revReason" class="input input-bordered input-sm" required>
            </div>
            <div class="form-control mb-2">
                <label class="label cursor-pointer justify-start gap-3 py-1">
                    <input type="checkbox" id="revNewDate" class="checkbox checkbox-sm">
                    <span class="label-text" data-i18n="fin_reversal_new_date">Провести текущей датой (chargeback)</span>
                </label>
            </div>
            <div class="form-control mb-2 hidden" id="revDateWrap">
                <label class="label py-0"><span class="label-text" data-i18n="fin_occurred_on">Дата</span></label>
                <input type="date" id="revDate" class="input input-bordered input-sm">
            </div>
            <div class="modal-action">
                <button type="button" class="btn" onclick="document.getElementById('reversalModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-error" data-i18n="fin_reverse">Сторнировать</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Модалка: Перевод -->
<dialog id="transferModal" class="modal">
    <div class="modal-box max-w-lg">
        <h3 class="font-bold text-lg mb-4" data-i18n="fin_new_transfer">Перевод</h3>
        <form id="transferForm">
            <div class="grid grid-cols-2 gap-3 mb-2">
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_occurred_on">Дата</span></label>
                    <input type="date" id="trDate" class="input input-bordered input-sm" required>
                </div>
                <div></div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_source_account">Счёт-источник</span></label>
                    <select id="trSource" class="select select-bordered select-sm" required></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_target_account">Счёт-получатель</span></label>
                    <select id="trTarget" class="select select-bordered select-sm" required></select>
                </div>
                <div class="form-control">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_amount">Сумма</span></label>
                    <input type="number" id="trAmount" class="input input-bordered input-sm" min="0.01" step="0.01" required>
                </div>
                <div class="form-control hidden" id="trTargetAmountWrap">
                    <label class="label py-0"><span class="label-text" data-i18n="fin_target_amount">Сумма получения</span></label>
                    <input type="number" id="trTargetAmount" class="input input-bordered input-sm" min="0.01" step="0.01">
                </div>
            </div>
            <div class="form-control mb-2">
                <label class="label py-0"><span class="label-text" data-i18n="fin_comment">Комментарий</span></label>
                <input type="text" id="trComment" class="input input-bordered input-sm">
            </div>
            <div class="modal-action items-center">
                <span id="trRecap" class="mr-auto text-sm font-semibold"></span>
                <button type="button" class="btn" onclick="document.getElementById('transferModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-primary" data-i18n="save">Сохранить</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script src="../js/config.js?v=4"></script>
<script src="../js/auth-check.js?v=7"></script>
<script src="../js/cache.js?v=1"></script>
<script src="../js/utils.js?v=4"></script>
<script src="../js/layout.js?v=31"></script>
<script src="../js/date-utils.js?v=3"></script>
<script src="../js/fin-utils.js?v=6"></script>
<script src="../js/pages/fin-dds.js?v=8"></script>

</body>
</html>
