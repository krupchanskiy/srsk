<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <script src="../js/color-init.js?v=2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="fin_page_title_inbox">Входящие — Финансы — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { screens: { 'desktop': '1200px' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css?v=3">
    <link rel="stylesheet" href="../css/fin.css?v=1">
</head>
<body class="fin-page bg-base-200 min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="container mx-auto px-4 py-6 flex-1">
    <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
        <h1 class="text-2xl font-bold" data-i18n="nav_fin_inbox">Входящие</h1>
    </div>

    <div role="tablist" class="tabs tabs-boxed w-fit mb-4">
        <a role="tab" class="tab tab-active" data-tab="pending"><span data-i18n="fin_tab_pending">Не проверено</span>&nbsp;<span class="badge badge-warning badge-sm" id="pendingTabCount">0</span></a>
        <a role="tab" class="tab" data-tab="disputed"><span data-i18n="fin_tab_disputed">Оспоренные</span>&nbsp;<span class="badge badge-error badge-sm" id="disputedTabCount">0</span></a>
    </div>

    <div id="inboxList" class="space-y-3">
        <div class="text-center py-8"><span class="loading loading-spinner loading-md"></span></div>
    </div>
</main>

<div id="footer-placeholder"></div>

<!-- Модалка: оспорить -->
<dialog id="disputeModal" class="modal">
    <div class="modal-box max-w-sm">
        <h3 class="font-bold text-lg mb-2" data-i18n="fin_dispute">Оспорить</h3>
        <div class="text-sm opacity-70 mb-3" id="disputeInfo"></div>
        <form id="disputeForm">
            <input type="hidden" id="disputeOpId">
            <input type="hidden" id="disputeExpected">
            <div class="form-control mb-2">
                <label class="label py-0"><span class="label-text" data-i18n="fin_dispute_reason">Причина спора</span></label>
                <input type="text" id="disputeReason" class="input input-bordered input-sm" required>
            </div>
            <div class="modal-action">
                <button type="button" class="btn" onclick="document.getElementById('disputeModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-error" data-i18n="fin_dispute">Оспорить</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Модалка: сторно -->
<dialog id="reversalModal" class="modal">
    <div class="modal-box max-w-sm">
        <h3 class="font-bold text-lg mb-2" data-i18n="fin_reversal">Сторно</h3>
        <div class="text-sm opacity-70 mb-3" id="revInfo"></div>
        <form id="reversalForm">
            <input type="hidden" id="revOpId">
            <div class="form-control mb-2">
                <label class="label py-0"><span class="label-text" data-i18n="fin_reason">Причина</span></label>
                <input type="text" id="revReason" class="input input-bordered input-sm" required>
            </div>
            <div class="modal-action">
                <button type="button" class="btn" onclick="document.getElementById('reversalModal').close()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-error" data-i18n="fin_reverse">Сторнировать</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script src="../js/config.js?v=4"></script>
<script src="../js/auth-check.js?v=7"></script>
<script src="../js/cache.js?v=1"></script>
<script src="../js/utils.js?v=4"></script>
<script src="../js/layout.js?v=27"></script>
<script src="../js/date-utils.js?v=3"></script>
<script src="../js/fin-utils.js?v=6"></script>
<script src="../js/pages/fin-inbox.js?v=3"></script>

</body>
</html>
