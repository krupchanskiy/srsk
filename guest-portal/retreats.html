    <main class="flex-1">
        <div class="max-w-4xl mx-auto px-4 md:px-6 lg:px-8 py-6">

            <!-- Содержимое -->
            <div id="retreats-content" class="space-y-4"></div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/portal-config.js"></script>
    <script src="js/portal-auth.js"></script>
    <script src="js/portal-layout.js?v=10"></script>
    <script src="../js/date-utils.js"></script>
    <script src="js/portal-data.js?v=3"></script>

    <script>
        const t = key => PortalLayout.t(key);
        const getName = item => PortalLayout.getName(item);
        const escapeHtml = str => PortalLayout.escapeHtml(str);
        const formatDateRange = (start, end) => PortalLayout.formatDateRange(start, end);

        async function init() {
            PortalLayout.showLoader();

            // Проверяем авторизацию
            const guest = await PortalAuth.checkGuestAuth();
            if (!guest) return;

            // Инициализируем layout
            await PortalLayout.init({ activeNav: 'retreats' });

            // Загружаем данные
            const data = await PortalData.loadRetreatsData(guest.id);

            // Рендерим страницу
            renderRetreats(data);

            PortalLayout.hideLoader();
        }

        // Статусы CRM для отображения гостю
        const CRM_STATUS_LABELS = {
            lead: { ru: 'Заявка принята', en: 'Application received', color: '#9CA3AF' },
            contacted: { ru: 'Связались с вами', en: 'Contacted', color: '#60A5FA' },
            invoice_sent: { ru: 'Счёт отправлен', en: 'Invoice sent', color: '#FBBF24' },
            prepaid: { ru: 'Предоплата получена', en: 'Prepaid', color: '#34D399' },
            tickets: { ru: 'Билеты подтверждены', en: 'Tickets confirmed', color: '#818CF8' },
            room_booked: { ru: 'Комната забронирована', en: 'Room booked', color: '#F472B6' },
            checked_in: { ru: 'Вы на ретрите', en: 'Checked in', color: '#10B981' },
            fully_paid: { ru: 'Полная оплата', en: 'Fully paid', color: '#059669' }
        };

        // Шаблон секции <details>
        function sectionDetails(bg, color, title, isOpen, content) {
            return `
                <details class="card p-5" style="background: ${bg};"${isOpen ? ' open' : ''}>
                    <summary class="flex items-center justify-between cursor-pointer select-none list-none [&::-webkit-details-marker]:hidden">
                        <div style="font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: ${color};">
                            ${title}
                        </div>
                        <svg class="w-5 h-5 transition-transform duration-200 details-chevron" style="color: ${color};" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                        </svg>
                    </summary>
                    <div class="mt-4">${content}</div>
                </details>
            `;
        }

        function renderRetreats(data) {
            const container = document.getElementById('retreats-content');

            const sections = [
                data.currentRetreat ? renderCurrentRetreat(data.currentRetreat) : '',
                renderCrmDeals(data.crmDeals),
                renderUpcomingRetreats(data.upcomingRetreats),
                renderAvailableRetreats(data.availableRetreats),
                renderPastRetreats(data.pastRetreats)
            ].filter(s => s);

            container.innerHTML = sections.join('');
        }

        function renderCurrentRetreat(registration) {
            const retreat = registration.retreat;

            const content = `
                <div class="bg-white/80 rounded-xl p-4">
                    <h3 class="text-lg font-bold text-gray-800">${escapeHtml(getName(retreat))}</h3>
                    <p class="text-gray-500 mt-1">${formatDateRange(retreat.start_date, retreat.end_date)}</p>
                    ${retreat.description_ru ? `
                        <p class="text-gray-600 mt-3">${escapeHtml(getDescription(retreat))}</p>
                    ` : ''}
                </div>
            `;

            return sectionDetails('#E0F5E8', '#147D30', t('portal_current_retreat'), true, content);
        }

        function renderUpcomingRetreats(retreats) {
            if (retreats.length === 0) return '';

            const content = `
                <div class="space-y-3">
                    ${retreats.map(reg => `
                        <div class="bg-white/80 rounded-xl p-4">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-lg flex flex-col items-center justify-center" style="background: rgba(74, 144, 217, 0.15);">
                                        <span class="text-lg font-bold" style="color: #4A90D9;">${DateUtils.parseDate(reg.retreat.start_date).getDate()}</span>
                                        <span class="text-xs" style="color: #4A90D9;">${getMonthShort(reg.retreat.start_date)}</span>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-gray-800">${escapeHtml(getName(reg.retreat))}</h3>
                                        <p class="text-sm text-gray-500">${formatDateRange(reg.retreat.start_date, reg.retreat.end_date)}</p>
                                    </div>
                                </div>
                                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium" style="background: rgba(74, 144, 217, 0.15); color: #4A90D9;">
                                    ${t('portal_status_registered')}
                                </span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            return sectionDetails('#F0F7FF', '#4A90D9', t('portal_upcoming_retreats'), true, content);
        }

        function renderAvailableRetreats(retreats) {
            const content = retreats.length === 0 ? `
                <div class="bg-white/80 rounded-xl p-6">
                    <div class="empty-state py-8">
                        <svg class="empty-state-icon mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <p>${t('portal_no_available_retreats')}</p>
                    </div>
                </div>
            ` : `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${retreats.map(retreat => `
                        <div class="bg-white/80 rounded-xl p-4 hover:shadow-md transition-shadow">
                            <div class="flex items-start gap-4">
                                <div class="w-14 h-14 rounded-lg flex flex-col items-center justify-center flex-shrink-0" style="background: rgba(153, 122, 0, 0.12);">
                                    <span class="text-xl font-bold" style="color: #997A00;">${DateUtils.parseDate(retreat.start_date).getDate()}</span>
                                    <span class="text-xs" style="color: #997A00;">${getMonthShort(retreat.start_date)}</span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="font-semibold text-gray-800">${escapeHtml(getName(retreat))}</h3>
                                    <p class="text-sm text-gray-500 mt-1">${formatDateRange(retreat.start_date, retreat.end_date)}</p>
                                    ${retreat.description_ru ? `
                                        <p class="text-sm text-gray-600 mt-2 line-clamp-2">${escapeHtml(getDescription(retreat).substring(0, 100))}...</p>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="mt-4 pt-4 border-t flex justify-end gap-2">
                                <a href="/retreat.html?id=${retreat.id}" class="btn-ghost text-sm py-1.5">
                                    ${t('portal_view_details')}
                                </a>
                                ${retreat.registration_open ? `
                                    <a href="/retreat.html?id=${retreat.id}" class="btn-primary text-sm py-1.5">
                                        ${t('portal_register_btn')}
                                    </a>
                                ` : `
                                    <button class="btn-secondary text-sm py-1.5" disabled title="${t('portal_registration_coming_soon')}">
                                        ${t('portal_register_btn')}
                                    </button>
                                `}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            return sectionDetails('#FFF3CD', '#997A00', t('portal_available_retreats'), true, content);
        }

        function renderPastRetreats(retreats) {
            if (retreats.length === 0) return '';

            const content = `
                <div class="bg-white/80 rounded-xl overflow-hidden">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>${t('portal_retreat_name')}</th>
                                    <th>${t('portal_dates')}</th>
                                    <th>${t('portal_status')}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${retreats.map(reg => `
                                    <tr>
                                        <td class="font-medium">${escapeHtml(getName(reg.retreat))}</td>
                                        <td class="text-gray-500">${formatDateRange(reg.retreat.start_date, reg.retreat.end_date)}</td>
                                        <td>
                                            <span class="status-badge status-completed">${t('portal_status_completed')}</span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            return sectionDetails('#F5F0FF', '#7C3AED', t('portal_past_retreats'), false, content);
        }

        function renderCrmDeals(deals) {
            if (!deals || deals.length === 0) return '';

            const lang = PortalLayout.getLang();

            const content = `
                <div class="space-y-3">
                    ${deals.map(deal => {
                        const retreat = deal.retreat;
                        const statusInfo = CRM_STATUS_LABELS[deal.status] || { ru: deal.status, en: deal.status, color: '#9CA3AF' };
                        const statusLabel = lang === 'ru' ? statusInfo.ru : statusInfo.en;

                        return `
                            <div class="bg-white/80 rounded-xl p-4">
                                <div class="flex items-start justify-between gap-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: rgba(107, 91, 149, 0.12);">
                                            <svg class="w-5 h-5" style="color: ${statusInfo.color};" fill="currentColor" viewBox="0 0 20 20">
                                                <circle cx="10" cy="10" r="6"/>
                                            </svg>
                                        </div>
                                        <div>
                                            <h3 class="font-semibold text-gray-800">${escapeHtml(getName(retreat))}</h3>
                                            <p class="text-sm text-gray-500">${formatDateRange(retreat?.start_date, retreat?.end_date)}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium" style="background: rgba(107, 91, 149, 0.12); color: #6B5B95;">
                                            ${statusLabel}
                                        </span>
                                        ${deal.total_paid > 0 ? `
                                            <div class="text-sm text-gray-500 mt-1">
                                                ${lang === 'ru' ? 'Оплачено' : 'Paid'}: &#8377;${deal.total_paid.toLocaleString()}
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                                ${deal.total_charged > 0 && deal.total_charged !== deal.total_paid ? `
                                    <div class="mt-3 pt-3 border-t">
                                        <div class="flex justify-between text-sm">
                                            <span class="text-gray-500">${lang === 'ru' ? 'К оплате' : 'To pay'}:</span>
                                            <span class="font-medium">&#8377;${(deal.total_charged - deal.total_paid).toLocaleString()}</span>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            return sectionDetails('#E8E0F0', '#6B5B95', lang === 'ru' ? 'Мои заявки' : 'My Applications', true, content);
        }

        function getDescription(retreat) {
            const lang = PortalLayout.getLang();
            return retreat[`description_${lang}`] || retreat.description_en || retreat.description_ru || '';
        }

        function getMonthShort(dateStr) {
            const date = DateUtils.parseDate(dateStr);
            const lang = PortalLayout.getLang();
            const locale = lang === 'ru' ? 'ru-RU' : lang === 'hi' ? 'hi-IN' : 'en-US';
            return date.toLocaleDateString(locale, { month: 'short' }).replace('.', '');
        }

        init();
    </script>
</body>
</html>
