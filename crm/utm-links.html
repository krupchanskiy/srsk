<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <script src="../js/color-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTM-ссылки — CRM — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { screens: { 'desktop': '1200px' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .link-row { transition: background 0.15s; }
        .link-row:hover { background: oklch(var(--b2)); }
        .copied { animation: copiedFlash 0.6s ease; }
        @keyframes copiedFlash { 0% { background: #d1fae5; } 100% { background: transparent; } }
    </style>
</head>
<body class="bg-base-200 min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="container mx-auto px-4 py-6 flex-1 max-w-4xl">
    <!-- Заголовок + кнопка -->
    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <h1 class="text-2xl font-bold">UTM-ссылки</h1>
        <button class="btn btn-primary" onclick="openCreateModal()" id="createBtn" style="display:none">
            + Создать ссылку
        </button>
    </div>

    <!-- Выбор ретрита -->
    <div class="card bg-base-100 shadow-sm mb-6">
        <div class="card-body p-4">
            <div class="form-control">
                <label class="label"><span class="label-text font-medium">Ретрит</span></label>
                <select id="retreatSelect" class="select select-bordered" onchange="loadLinks()">
                    <option value="">Загрузка...</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Сохранённые ссылки -->
    <div id="savedLinksContainer" class="mb-6 hidden">
        <div id="savedLinks" class="space-y-2"></div>
    </div>

    <!-- EN hint -->
    <div class="card bg-base-100 shadow-sm hidden" id="enHint">
        <div class="card-body p-4">
            <p class="text-sm text-base-content/60">Для англоязычной формы добавьте <code class="badge badge-sm">&lang=en</code> к любой ссылке.</p>
        </div>
    </div>
</main>

<!-- Модалка создания ссылки -->
<dialog id="createModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Новая UTM-ссылка</h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-xs">Название <span class="text-error">*</span></span></label>
                <input type="text" id="newName" class="input input-bordered input-sm" placeholder="Telegram-канал">
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-xs">utm_source <span class="text-error">*</span></span></label>
                <input type="text" id="newSource" class="input input-bordered input-sm" placeholder="telegram">
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-xs">utm_medium</span></label>
                <input type="text" id="newMedium" class="input input-bordered input-sm" placeholder="post">
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text text-xs">utm_campaign</span></label>
                <input type="text" id="newCampaign" class="input input-bordered input-sm" placeholder="">
            </div>
        </div>

        <!-- Пресеты -->
        <div class="flex flex-wrap gap-1 mt-3">
            <span class="text-xs text-base-content/50 self-center mr-1">Быстро:</span>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('Telegram-канал','telegram','post')">Telegram</button>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('Instagram','instagram','post')">Instagram</button>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('YouTube','youtube','description')">YouTube</button>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('WhatsApp рассылка','whatsapp','broadcast')">WhatsApp</button>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('Email рассылка','email','newsletter')">Email</button>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('Сайт rupaseva.com','website','banner')">Сайт</button>
            <button class="btn btn-xs btn-ghost" onclick="fillPreset('Личное сообщение','personal','message')">Личное</button>
        </div>

        <div class="modal-action">
            <form method="dialog"><button class="btn btn-ghost">Отмена</button></form>
            <button class="btn btn-primary" onclick="createLink()">Создать</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<div id="footer-placeholder"></div>

<script src="../js/config.js"></script>
<script src="../js/cache.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/date-utils.js"></script>
<script src="../js/auth-check.js"></script>

<script>
const BASE_URL = 'https://in.rupaseva.com/crm/form.html';
const e = Layout.escapeHtml;

let retreats = [];
let links = [];
let dealsBySource = {};

function buildUrl(slug, source, medium, campaign) {
    const params = new URLSearchParams();
    params.set('retreat', slug);
    if (source) params.set('utm_source', source);
    if (medium) params.set('utm_medium', medium);
    if (campaign) params.set('utm_campaign', campaign);
    return BASE_URL + '?' + params.toString();
}

function fillPreset(name, source, medium) {
    document.getElementById('newName').value = name;
    document.getElementById('newSource').value = source;
    document.getElementById('newMedium').value = medium;
    // campaign = slug ретрита
    const retreat = retreats.find(r => r.id === document.getElementById('retreatSelect').value);
    document.getElementById('newCampaign').value = retreat?.slug || '';
}

function openCreateModal() {
    const retreat = retreats.find(r => r.id === document.getElementById('retreatSelect').value);
    document.getElementById('newName').value = '';
    document.getElementById('newSource').value = '';
    document.getElementById('newMedium').value = '';
    document.getElementById('newCampaign').value = retreat?.slug || '';
    document.getElementById('createModal').showModal();
}

async function loadLinks() {
    const retreatId = document.getElementById('retreatSelect').value;
    if (!retreatId) {
        document.getElementById('savedLinksContainer').classList.add('hidden');
        document.getElementById('createBtn').style.display = 'none';
        document.getElementById('enHint').classList.add('hidden');
        return;
    }

    document.getElementById('createBtn').style.display = '';

    // Загружаем сохранённые ссылки
    const { data } = await Layout.db
        .from('crm_utm_links')
        .select('*')
        .eq('retreat_id', retreatId)
        .order('created_at');
    links = data || [];

    // Загружаем статистику по utm_source для этого ретрита
    const { data: deals } = await Layout.db
        .from('crm_deals')
        .select('utm_source, utm_medium, utm_campaign, status')
        .eq('retreat_id', retreatId);

    dealsBySource = {};
    (deals || []).forEach(d => {
        const key = [d.utm_source, d.utm_medium, d.utm_campaign].filter(Boolean).join('|');
        if (!dealsBySource[key]) dealsBySource[key] = { total: 0, paid: 0 };
        dealsBySource[key].total++;
        if (['paid', 'ready', 'completed'].includes(d.status)) dealsBySource[key].paid++;
    });

    renderLinks();

    // Заполняем campaign из slug
    const retreat = retreats.find(r => r.id === retreatId);
    document.getElementById('newCampaign').value = retreat?.slug || '';

    document.getElementById('createBlock').classList.remove('hidden');
    document.getElementById('enHint').classList.remove('hidden');
}

function renderLinks() {
    const container = document.getElementById('savedLinks');

    if (links.length === 0) {
        container.innerHTML = '<div class="text-center py-6 text-base-content/50">Нет сохранённых ссылок. Создайте первую!</div>';
        document.getElementById('savedLinksContainer').classList.remove('hidden');
        return;
    }

    const retreat = retreats.find(r => r.id === document.getElementById('retreatSelect').value);
    const slug = retreat?.slug || retreat?.id || '';

    container.innerHTML = links.map(link => {
        const url = buildUrl(slug, link.utm_source, link.utm_medium, link.utm_campaign);
        const key = [link.utm_source, link.utm_medium, link.utm_campaign].filter(Boolean).join('|');
        const stats = dealsBySource[key] || { total: 0, paid: 0 };

        return `
            <div class="link-row flex items-center gap-3 p-3 bg-base-100 rounded-lg border border-base-200">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-medium text-sm">${e(link.name)}</span>
                        ${stats.total > 0 ? `
                            <span class="badge badge-sm badge-ghost">${stats.total} заявок</span>
                            ${stats.paid > 0 ? `<span class="badge badge-sm badge-success">${stats.paid} оплат</span>` : ''}
                        ` : '<span class="badge badge-sm badge-ghost">0 заявок</span>'}
                    </div>
                    <div class="text-xs text-base-content/40 font-mono truncate">${e(url)}</div>
                </div>
                <button class="btn btn-sm btn-ghost" onclick="copyLink('${url.replace(/'/g, "\\'")}', this)" title="Копировать">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9.75a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" /></svg>
                </button>
                <button class="btn btn-sm btn-ghost text-error" onclick="deleteLink('${link.id}')" title="Удалить">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                </button>
            </div>
        `;
    }).join('');

    document.getElementById('savedLinksContainer').classList.remove('hidden');
}

async function createLink() {
    const retreatId = document.getElementById('retreatSelect').value;
    const name = document.getElementById('newName').value.trim();
    const source = document.getElementById('newSource').value.trim();
    const medium = document.getElementById('newMedium').value.trim();
    const campaign = document.getElementById('newCampaign').value.trim();

    if (!name || !source) {
        Layout.showNotification('Укажите название и utm_source', 'error');
        return;
    }

    const { error } = await Layout.db.from('crm_utm_links').insert({
        retreat_id: retreatId,
        name,
        utm_source: source,
        utm_medium: medium || null,
        utm_campaign: campaign || null,
        created_by: window.currentUser?.vaishnava_id || null
    });

    if (error) { Layout.handleError(error, 'Создание ссылки'); return; }

    // Закрываем модалку и очищаем форму
    document.getElementById('createModal').close();
    document.getElementById('newName').value = '';
    document.getElementById('newSource').value = '';
    document.getElementById('newMedium').value = '';

    Layout.showNotification('Ссылка создана', 'success');
    await loadLinks();
}

async function deleteLink(id) {
    if (!confirm('Удалить ссылку?')) return;
    await Layout.db.from('crm_utm_links').delete().eq('id', id);
    Layout.showNotification('Удалено', 'success');
    await loadLinks();
}

async function copyLink(url, btn) {
    try {
        await navigator.clipboard.writeText(url);
        const origHtml = btn.innerHTML;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-success"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>';
        btn.closest('.link-row')?.classList.add('copied');
        setTimeout(() => {
            btn.innerHTML = origHtml;
            btn.closest('.link-row')?.classList.remove('copied');
        }, 1500);
    } catch (err) {
        Layout.showNotification('Скопировано', 'success');
    }
}

async function init() {
    await Layout.init({ module: 'crm', menuId: 'crm_settings', itemId: 'crm_utm_links' });

    const today = new Date().toISOString().split('T')[0];
    const { data } = await Layout.db
        .from('retreats')
        .select('id, name_ru, name_en, slug, start_date, end_date')
        .gte('end_date', today)
        .order('start_date');

    retreats = data || [];

    const select = document.getElementById('retreatSelect');
    select.innerHTML = '<option value="">Выберите ретрит</option>';
    retreats.forEach(r => {
        const name = Layout.getName(r);
        const dates = DateUtils.formatRange(r.start_date, r.end_date);
        select.insertAdjacentHTML('beforeend',
            `<option value="${r.id}">${Layout.escapeHtml(name)} (${dates})</option>`
        );
    });

    if (retreats.length === 1) {
        select.value = retreats[0].id;
        await loadLinks();
    }
}

init();
</script>

</body>
</html>
