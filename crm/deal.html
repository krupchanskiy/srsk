<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <script src="../js/color-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="crm_deal_page_title">Сделка — CRM — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { screens: { 'desktop': '1200px' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body class="bg-base-200 min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="container mx-auto px-4 py-6 flex-1">
    <!-- Хлебные крошки -->
    <div class="text-sm breadcrumbs mb-4">
        <ul>
            <li><a href="deals.html" data-i18n="nav_crm_deals">Все сделки</a></li>
            <li id="breadcrumbGuest" data-i18n="loading">Загрузка...</li>
        </ul>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
        <!-- Основной контент -->
        <div class="flex-1">
            <!-- Заголовок — плашка с именем, статусом, режимом, менеджером -->
            <style>
                #dealStatusBanner select { background-color: transparent; border: 1px solid rgba(255,255,255,0.25); color: white; }
                #dealStatusBanner select:focus { outline: none; border-color: rgba(255,255,255,0.5); }
                #dealStatusBanner select option { color: #1f2937; background: white; }
            </style>
            <div id="dealStatusBanner" class="rounded-xl px-5 py-4 mb-4">
                <!-- Верхняя строка: имя + статус -->
                <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
                    <div class="group flex items-center gap-2 min-w-0">
                        <h1 class="text-xl sm:text-2xl font-bold text-white truncate" id="guestName">—</h1>
                        <button class="btn btn-ghost btn-xs opacity-0 group-hover:opacity-100 p-0 h-5 w-5 min-h-0 text-white/60 hover:text-white" onclick="startEditName()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Z" /></svg>
                        </button>
                        <span id="repeatGuestBadge" class="badge badge-sm badge-warning hidden shrink-0">повторный</span>
                    </div>
                    <select id="statusSelect" class="select select-sm font-bold text-sm min-w-[140px] shrink-0" onchange="changeStatus(this.value)">
                    </select>
                </div>
                <!-- Нижняя строка: контакты + режим/менеджер -->
                <div class="flex flex-wrap items-center justify-between gap-2">
                    <div class="flex items-center gap-2 min-w-0">
                        <span class="text-white/60 text-xs sm:text-sm truncate" id="guestContact">—</span>
                        <div class="flex gap-1 shrink-0" id="quickContactButtons"></div>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 shrink-0">
                        <select id="workModeSelect" class="select select-xs text-xs min-w-[90px]" onchange="changeWorkMode(this.value)" title="Температура — насколько активно работаем с гостем">
                            <option value="active">🔥 Горячий</option>
                            <option value="long_term">🌡 Тёплый</option>
                            <option value="paused">❄️ Холодный</option>
                        </select>
                        <select id="managerSelect" class="select select-xs text-xs min-w-[110px]" onchange="changeManager(this.value)">
                        </select>
                    </div>
                </div>
            </div>

            <!-- Вкладки -->
            <div class="tabs tabs-boxed mb-4">
                <button class="tab tab-active" onclick="switchTab('info')" id="tabInfo" data-i18n="crm_tab_info">Инфо</button>
                <button class="tab" onclick="switchTab('services')" id="tabServices" data-i18n="crm_tab_services">Услуги</button>
                <button class="tab" onclick="switchTab('payments')" id="tabPayments" data-i18n="crm_tab_payments">Оплаты</button>
                <button class="tab" onclick="switchTab('tasks')" id="tabTasks" data-i18n="crm_tab_tasks">Задачи</button>
                <button class="tab" onclick="switchTab('history')" id="tabHistory" data-i18n="crm_tab_history">История</button>
            </div>

            <!-- Контент вкладок -->
            <div id="tabContent" class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <div class="text-center py-8">
                        <span class="loading loading-spinner loading-md"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Боковая панель -->
        <div class="w-full lg:w-80 space-y-4">
            <!-- Заметки -->
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="font-bold mb-3">Заметки</h3>
                    <!-- Тип контакта — иконки -->
                    <div class="flex gap-1 mb-3" id="commTypeButtons">
                        <button type="button" class="btn btn-sm btn-primary flex-1 comm-type-btn" data-type="call" onclick="selectCommType('call')" title="Звонок">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" /></svg>
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost flex-1 comm-type-btn" data-type="whatsapp" onclick="selectCommType('whatsapp')" title="WhatsApp">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 9.75a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" /></svg>
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost flex-1 comm-type-btn" data-type="telegram" onclick="selectCommType('telegram')" title="Telegram">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" /></svg>
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost flex-1 comm-type-btn" data-type="email" onclick="selectCommType('email')" title="Email">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" /></svg>
                        </button>
                        <button type="button" class="btn btn-sm btn-ghost flex-1 comm-type-btn" data-type="note" onclick="selectCommType('note')" title="Заметка">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
                        </button>
                    </div>
                    <textarea id="quickCommText" class="textarea textarea-bordered textarea-sm w-full" rows="2" placeholder="Что произошло..."></textarea>
                    <button type="button" class="btn btn-sm btn-primary w-full mt-2" onclick="quickAddComm()">
                        Записать
                    </button>
                    <!-- Последние контакты -->
                    <div id="recentComms" class="mt-3 border-t border-base-200 pt-2 hidden"></div>
                </div>
            </div>

            <!-- Чеклист гостя -->
            <div class="card shadow-sm transition-colors duration-500" id="checklistCard">
                <div class="card-body p-4">
                    <h3 class="font-bold mb-3" id="checklistTitle">Чеклист</h3>
                    <style>
                        #checklistGrid .label { padding: 2px 0 0; }
                        #checklistGrid .label-text { white-space: nowrap; font-size: 11px; }
                        #checklistGrid select { font-size: 13px; padding-left: 6px; padding-right: 20px; height: 28px; min-height: 28px; }
                    </style>
                    <div class="grid grid-cols-2 gap-x-3 gap-y-0.5" id="checklistGrid">
                        <div class="form-control">
                            <label class="label"><span class="label-text opacity-50">Проживание</span></label>
                            <select class="select select-xs w-full" onchange="updateChecklist('checklist_accommodation', this.value)" id="cl_accommodation">
                                <option value="unknown">—</option>
                                <option value="guest_house">Гостевой дом ШРСК</option>
                                <option value="staff_house">Служебные дома ШРСК</option>
                                <option value="partner_hotel">Другие гостиницы</option>
                                <option value="self">Самостоятельно</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text opacity-50">Питание</span></label>
                            <select class="select select-xs w-full" onchange="updateChecklist('checklist_meals', this.value)" id="cl_meals">
                                <option value="unknown">—</option>
                                <option value="in_ashram">В ШРСК</option>
                                <option value="self">Сам</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text opacity-50">Виза</span></label>
                            <select class="select select-xs w-full" onchange="updateChecklist('checklist_visa', this.value)" id="cl_visa">
                                <option value="unknown">—</option>
                                <option value="needs_help">Помощь</option>
                                <option value="not_needed">Не нужна</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text opacity-50">Билеты</span></label>
                            <select class="select select-xs w-full" onchange="updateChecklist('checklist_tickets', this.value)" id="cl_tickets">
                                <option value="unknown">—</option>
                                <option value="bought">Куплены</option>
                                <option value="not_bought">Не куплены</option>
                                <option value="not_needed">Не нужны</option>
                            </select>
                        </div>
                    </div>

                    <!-- Рейсы (раскрываются при Билеты = Куплены) -->
                    <div id="flightFieldsBlock" class="hidden mt-3 space-y-3">
                        <!-- Прибытие -->
                        <div class="pl-2 border-l-2 border-primary/30">
                            <div class="text-xs font-semibold opacity-50 mb-1">Прибытие</div>
                            <div class="grid grid-cols-2 gap-1">
                                <input type="text" class="input input-bordered input-xs" id="arrivalFlight" placeholder="Рейс" onchange="saveFlightField('arrival_flight', this.value)">
                                <input type="text" class="input input-bordered input-xs" id="arrivalAirport" placeholder="Аэропорт" onchange="saveFlightField('arrival_airport', this.value)">
                            </div>
                            <input type="datetime-local" class="input input-bordered input-xs w-full mt-1" id="arrivalDatetime" onchange="saveArrivalDatetime(this.value)">
                            <div class="flex flex-wrap gap-x-4 gap-y-0 mt-1">
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" class="checkbox checkbox-xs checkbox-primary" id="arrivalNeedsTransfer" onchange="updateChecklist('checklist_transfer_arrival', this.checked ? 'needed' : 'not_needed')">
                                    <span class="text-xs opacity-60">Трансфер</span>
                                </label>
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" class="checkbox checkbox-xs checkbox-warning" id="arrivalEarlyCheckin" onchange="saveFlightField('arrival_early_checkin', this.checked)">
                                    <span class="text-xs opacity-60">Ранний заезд</span>
                                </label>
                            </div>
                        </div>
                        <!-- Отъезд -->
                        <div class="pl-2 border-l-2 border-primary/30">
                            <div class="text-xs font-semibold opacity-50 mb-1">Отъезд</div>
                            <div class="grid grid-cols-2 gap-1">
                                <input type="text" class="input input-bordered input-xs" id="departureFlight" placeholder="Рейс" onchange="saveFlightField('departure_flight', this.value)">
                                <input type="text" class="input input-bordered input-xs" id="departureAirport" placeholder="Аэропорт" onchange="saveFlightField('departure_airport', this.value)">
                            </div>
                            <input type="datetime-local" class="input input-bordered input-xs w-full mt-1" id="departureDatetime" onchange="saveDepartureDatetime(this.value)">
                            <div class="flex flex-wrap gap-x-4 gap-y-0 mt-1">
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" class="checkbox checkbox-xs checkbox-primary" id="departureNeedsTransfer" onchange="updateChecklist('checklist_transfer_departure', this.checked ? 'needed' : 'not_needed')">
                                    <span class="text-xs opacity-60">Трансфер</span>
                                </label>
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" class="checkbox checkbox-xs checkbox-warning" id="departureLateCheckout" onchange="saveFlightField('departure_late_checkout', this.checked)">
                                    <span class="text-xs opacity-60">Поздний выезд</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div id="checklistReadiness" class="mt-2 text-xs text-center"></div>
                </div>
            </div>

            <!-- Старый блок рейсов убран — теперь внутри чеклиста -->

            <!-- Финансы -->
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold" data-i18n="crm_finances">Финансы</h3>
                        <button class="btn btn-xs btn-primary" onclick="openPaymentModal()">+ Платёж</button>
                    </div>
                    <!-- Список платежей -->
                    <div id="financePaymentsList" class="space-y-1 mb-2">
                        <p class="text-base-content/40 text-xs text-center py-2">Нет платежей</p>
                    </div>
                    <!-- Итого -->
                    <div class="border-t border-base-200 pt-2 space-y-1">
                        <div class="flex justify-between text-sm">
                            <span class="text-base-content/60" data-i18n="crm_charged">Начислено</span>
                            <span class="font-mono font-bold text-slate-700" id="financeCharged">—</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-base-content/60" data-i18n="crm_paid">Оплачено (₹)</span>
                            <span class="font-mono font-bold text-emerald-600" id="financePaid">—</span>
                        </div>
                        <div class="flex justify-between text-sm font-bold pt-1 border-t border-base-200">
                            <span class="text-base-content/60" data-i18n="crm_balance">Баланс</span>
                            <span class="font-mono" id="financeBalance">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Теги -->
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="font-bold mb-3" data-i18n="crm_tags">Теги</h3>
                    <div id="dealTags" class="flex flex-wrap gap-2 mb-3"></div>
                    <select id="addTagSelect" class="select select-bordered select-sm w-full" onchange="addTag(this.value)">
                        <option value="" data-i18n="crm_add_tag">+ Добавить тег...</option>
                    </select>
                </div>
            </div>

            <!-- Действия -->
            <div class="card bg-base-100 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="font-bold mb-3" data-i18n="crm_actions">Действия</h3>
                    <div class="space-y-2">
                        <button class="btn btn-sm btn-block btn-outline gap-2" onclick="createGuestAccess()" id="createAccessBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" /></svg>
                            Создать доступ к порталу
                        </button>
                        <button class="btn btn-sm btn-block btn-outline gap-2" onclick="openTemplatesModal()" id="templatesBtn" data-i18n="crm_message_templates">
                            Шаблоны сообщений
                        </button>
                        <button class="btn btn-sm btn-block btn-outline text-error gap-2" onclick="cancelDeal()" id="cancelBtn" data-i18n="crm_cancel_deal">
                            Отменить сделку
                        </button>
                        <button class="btn btn-sm btn-block btn-error gap-2 hidden" onclick="deleteDeal()" id="deleteBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                            Удалить сделку
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<!-- Модалка добавления услуги -->
<dialog id="addServiceModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4" data-i18n="crm_add_service">Добавить услугу</h3>
        <form onsubmit="saveService(event)">
            <input type="hidden" id="editServiceId">

            <div class="form-control mb-3">
                <label class="label"><span class="label-text" data-i18n="crm_service">Услуга</span></label>
                <select id="serviceSelect" class="select select-bordered" onchange="onServiceSelect()">
                    <option value="" data-i18n="crm_select_service">Выберите услугу...</option>
                    <option value="custom" data-i18n="crm_custom_service">— Другое (ввести вручную) —</option>
                </select>
            </div>

            <div id="customServiceDesc" class="form-control mb-3 hidden">
                <label class="label"><span class="label-text" data-i18n="crm_description">Описание</span></label>
                <input type="text" id="serviceDescription" class="input input-bordered">
            </div>

            <div class="grid grid-cols-3 gap-3 mb-4">
                <div class="form-control">
                    <label class="label"><span class="label-text" data-i18n="crm_quantity">Кол-во</span></label>
                    <input type="number" id="serviceQty" class="input input-bordered" value="1" min="0.01" step="0.01" oninput="calcServiceTotal()">
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text" data-i18n="crm_price_inr">Цена (₹)</span></label>
                    <input type="number" id="servicePrice" class="input input-bordered" value="0" min="0" step="0.01" oninput="calcServiceTotal()">
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text" data-i18n="crm_total_inr">Итого (₹)</span></label>
                    <input type="number" id="serviceTotal" class="input input-bordered font-bold" readonly>
                </div>
            </div>

            <div class="modal-action">
                <button type="button" class="btn" onclick="closeServiceModal()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-primary" data-i18n="save">Сохранить</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<!-- Модалка добавления оплаты -->
<dialog id="addPaymentModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4" data-i18n="crm_add_payment">Добавить оплату</h3>
        <form onsubmit="savePayment(event)">
            <div class="form-control mb-3">

<script>
const t = key => Layout.t(key);
const e = str => Layout.escapeHtml(str);

// ==================== STATE ====================
let dealId = new URLSearchParams(window.location.search).get('id');
let deal = null;
let guest = null;
let retreat = null;
let services = [];
let dealServices = [];
let payments = [];
let tasks = [];
let communications = [];
let history = [];
let tags = [];
let dealTags = [];
let managers = [];
let currencies = [];
let templates = [];
let guestHistory = [];
let currentTab = 'info';
let counts = { services: 0, payments: 0, tasks: 0 };

// ==================== DATA ====================
async function loadDeal() {
    if (!dealId) {
        Layout.showNotification('ID сделки не указан', 'error');
        return;
    }

    const { data, error } = await Layout.db
        .from('crm_deals')
        .select(`
            *,
            vaishnavas:vaishnava_id(*),
            retreats:retreat_id(*),
            manager:manager_id(id, spiritual_name, first_name, last_name),
            cancellation_reason:cancellation_reason_id(*)
        `)
        .eq('id', dealId)
        .single();

    if (error || !data) {
        Layout.handleError(error, 'Загрузка сделки');
        return;
    }

    deal = data;
    guest = data.vaishnavas;
    retreat = data.retreats;

    renderHeader();
    renderSidebar();
    renderChecklist();
    renderFlightData();
    await Promise.all([loadCounts(), loadPayments(), loadGuestHistory(), loadDealMembers(), loadPlacement(), loadRecentComms()]);
    renderHeader(); // повторно — теперь с бейджем «повторный гость»
    loadTabData();
}

async function loadCounts() {
    const [servicesRes, paymentsRes, tasksRes] = await Promise.all([
        Layout.db.from('crm_deal_services').select('id', { count: 'exact', head: true }).eq('deal_id', dealId),
        Layout.db.from('crm_payments').select('id', { count: 'exact', head: true }).eq('deal_id', dealId),
        Layout.db.from('crm_tasks').select('id', { count: 'exact', head: true }).eq('deal_id', dealId).is('completed_at', null)
    ]);

    counts.services = servicesRes.count || 0;
    counts.payments = paymentsRes.count || 0;
    counts.tasks = tasksRes.count || 0;

    updateTabCounts();
}

async function loadGuestHistory() {
    if (!guest?.id) return;

    const { data } = await Layout.db
        .from('crm_deals')
        .select('id, status, source, notes, created_at, retreats:retreat_id(name_ru, name_en, name_hi, start_date, end_date, color)')
        .eq('vaishnava_id', guest.id)
        .neq('id', dealId)
        .order('created_at', { ascending: false });

    guestHistory = data || [];
}

function updateTabCounts() {
    const badge = (n) => n > 0 ? `<sup class="ml-1 text-xs opacity-70">${n}</sup>` : '';

    document.getElementById('tabServices').innerHTML = 'Услуги' + badge(counts.services);
    document.getElementById('tabPayments').innerHTML = 'Оплаты' + badge(counts.payments);
    document.getElementById('tabTasks').innerHTML = 'Задачи' + badge(counts.tasks);
}

async function loadReferenceData() {
    // Получаем role_id для CRM-ролей (sales_manager, sales_head)
    const rolesRes = await Layout.db.from('roles')
        .select('id')
        .in('code', ['sales_manager', 'sales_head']);
    const roleIds = (rolesRes.data || []).map(r => r.id);

    // Получаем user_id с этими ролями
    const userRolesRes = roleIds.length > 0
        ? await Layout.db.from('user_roles')
            .select('user_id')
            .in('role_id', roleIds)
            .eq('is_active', true)
        : { data: [] };

    const managerUserIds = [...new Set((userRolesRes.data || []).map(r => r.user_id))];

    const [servicesRes, tagsRes, managersRes, currenciesRes, templatesRes, dealTagsRes] = await Promise.all([
        Layout.db.from('crm_services').select('*').eq('is_active', true).order('sort_order'),
        Layout.db.from('crm_tags').select('*').order('sort_order'),
        // Загружаем менеджеров напрямую по user_id (не все team members, а именно с CRM-ролями)
        managerUserIds.length > 0
            ? Layout.db.from('vaishnavas')
                .select('id, spiritual_name, first_name, last_name, user_id')
                .in('user_id', managerUserIds)
                .eq('is_deleted', false)
            : Promise.resolve({ data: [] }),
        Layout.db.from('crm_currencies').select('*').order('sort_order'),
        Layout.db.from('crm_message_templates').select('*').order('sort_order'),
        Layout.db.from('crm_deal_tags').select('tag_id').eq('deal_id', dealId)
    ]);

    services = servicesRes.data || [];
    tags = tagsRes.data || [];
    currencies = currenciesRes.data || [];
    templates = templatesRes.data || [];
    dealTags = (dealTagsRes.data || []).map(dt => dt.tag_id);

    managers = managersRes.data || [];

    populateSelects();
}

async function loadTabData() {
    switch (currentTab) {
        case 'services':
            await loadDealServices();
            break;
        case 'payments':
            await loadPayments();
            break;
        case 'tasks':
            await loadTasks();
            break;
        case 'history':
            await loadHistory();
            break;
    }
    renderTab();
}

async function loadDealServices() {
    const { data } = await Layout.db
        .from('crm_deal_services')
        .select('*, crm_services(name_ru, name_en)')
        .eq('deal_id', dealId)
        .order('created_at');
    dealServices = data || [];
}

async function loadPayments() {
    const { data } = await Layout.db
        .from('crm_payments')
        .select('*, received_by:vaishnavas(spiritual_name, first_name)')
        .eq('deal_id', dealId)
        .order('received_at', { ascending: false });
    payments = data || [];
    renderFinanceBlock();
}

async function loadTasks() {
    const { data } = await Layout.db
        .from('crm_tasks')
        .select('*, assignee:assignee_id(spiritual_name, first_name)')
        .eq('deal_id', dealId)
        .order('due_date', { nullsFirst: false });
    tasks = data || [];
}

async function loadHistory() {
    const [commRes, histRes] = await Promise.all([
        Layout.db.from('crm_communications')
            .select('*, created_by:vaishnavas(spiritual_name, first_name)')
            .eq('deal_id', dealId)
            .order('created_at', { ascending: false }),
        Layout.db.from('crm_deal_history')
            .select('*, changed_by:vaishnavas(spiritual_name, first_name)')
            .eq('deal_id', dealId)
            .order('changed_at', { ascending: false })
    ]);
    communications = commRes.data || [];
    history = histRes.data || [];
}

// ==================== RENDER ====================
function renderHeader() {
    document.getElementById('breadcrumbGuest').textContent = CrmUtils.getGuestName(guest);
    document.getElementById('guestName').textContent = CrmUtils.getGuestName(guest);
    document.getElementById('guestContact').textContent = CrmUtils.getGuestContact(guest);

    // Плашка статуса
    const statusColor = CrmUtils.STATUS_COLORS[deal.status] || '#6b7280';
    const statusSvg = CrmUtils.STATUS_SVG_ICONS[deal.status] || '';
    const statusName = t('crm_status_' + deal.status) || deal.status;

    document.getElementById('dealStatusBanner').style.backgroundColor = statusColor;
    // statusIcon и statusName теперь в select баннера

    // Быстрые контакты
    const btns = [];
    const phone = guest.phone;
    if (phone) {
        const cleanPhone = phone.replace(/[^\d+]/g, '');
        btns.push(`<a href="tel:${Layout.escapeHtml(cleanPhone)}" class="btn btn-xs btn-ghost text-white/80 gap-1" title="Позвонить"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg></a>`);
        btns.push(`<a href="https://wa.me/${cleanPhone.replace('+','')}" target="_blank" rel="noopener noreferrer" class="btn btn-xs btn-ghost text-white/80 gap-1" title="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.05 21.785c-1.826 0-3.616-.491-5.18-1.42l-.372-.22-3.858.964.98-3.765-.244-.388A9.82 9.82 0 0 1 2.17 12.06c0-5.456 4.438-9.894 9.9-9.894 2.645 0 5.13 1.03 6.998 2.9a9.825 9.825 0 0 1 2.893 7.002c-.003 5.456-4.44 9.894-9.9 9.894l-.01-.001zM12.05.18C5.547.18.17 5.555.17 12.06c0 2.095.546 4.142 1.588 5.945L.06 24l6.168-1.617a11.86 11.86 0 0 0 5.82 1.524c6.5 0 11.88-5.375 11.88-11.88C23.93 5.527 18.55.18 12.05.18z"/></svg></a>`);
    }
    if (guest.telegram) {
        const tg = guest.telegram.replace('@', '');
        btns.push(`<a href="https://t.me/${Layout.escapeHtml(tg)}" target="_blank" rel="noopener noreferrer" class="btn btn-xs btn-ghost text-white/80 gap-1" title="Telegram"><svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg></a>`);
    }
    if (guest.email) {
        btns.push(`<a href="mailto:${Layout.escapeHtml(guest.email)}" class="btn btn-xs btn-ghost text-white/80 gap-1" title="Email"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg></a>`);
    }
    document.getElementById('quickContactButtons').innerHTML = btns.join('');

    // Бейдж «повторный гость»
    if (guestHistory && guestHistory.length > 0) {
        document.getElementById('repeatGuestBadge').classList.remove('hidden');
    }

    document.title = `${CrmUtils.getGuestShortName(guest)} — CRM — ШРСК`;
}

function renderSidebar() {
    // Статус
    const statusSelect = document.getElementById('statusSelect');
    statusSelect.innerHTML = CrmUtils.STATUSES.map(s =>
        `<option value="${s}" ${s === deal.status ? 'selected' : ''}>${CrmUtils.getStatusLabel(s)}</option>`
    ).join('');

    // Режим работы
    document.getElementById('workModeSelect').value = deal.work_mode || 'active';

    // Менеджер
    const managerSelect = document.getElementById('managerSelect');
    managerSelect.innerHTML = '<option value="">Не назначен</option>' +
        managers.map(m => `<option value="${m.id}" ${m.id === deal.manager_id ? 'selected' : ''}>
            ${e(CrmUtils.getGuestName(m))}</option>`).join('');

    // Финансы — рендерятся отдельно через renderFinanceBlock() после загрузки платежей

    // Теги
    renderTags();

    // Скрыть кнопку отмены если уже отменено, показать удаление
    document.getElementById('cancelBtn').classList.toggle('hidden', deal.status === 'cancelled');
    document.getElementById('deleteBtn').classList.toggle('hidden', deal.status !== 'cancelled');

    // Кнопка доступа к порталу
    const accessBtn = document.getElementById('createAccessBtn');
    if (guest.user_id) {
        accessBtn.disabled = true;
        accessBtn.classList.add('btn-success', 'btn-disabled');
        accessBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg> Доступ создан';
    } else if (!guest.email) {
        accessBtn.disabled = true;
        accessBtn.title = 'Укажите email гостя';
    }
}

function renderTags() {
    const container = document.getElementById('dealTags');
    const activeTags = tags.filter(t => dealTags.includes(t.id));

    container.innerHTML = activeTags.length === 0
        ? '<span class="text-base-content/30 text-sm">Нет тегов</span>'
        : activeTags.map(tag => `
            <span class="badge gap-1" style="background-color: ${tag.color}; color: white;">
                ${e(Layout.getName(tag))}
                <button onclick="removeTag('${tag.id}')" class="hover:opacity-70">×</button>
            </span>
        `).join('');

    // Обновляем селект добавления
    const availableTags = tags.filter(t => !dealTags.includes(t.id));
    document.getElementById('addTagSelect').innerHTML = '<option value="">+ Добавить тег...</option>' +
        availableTags.map(t => `<option value="${t.id}">${e(Layout.getName(t))}</option>`).join('');
}

function populateSelects() {
    // Услуги
    const serviceSelect = document.getElementById('serviceSelect');
    serviceSelect.innerHTML = '<option value="">Выберите услугу...</option>' +
        '<option value="custom">— Другое (ввести вручную) —</option>' +
        services.map(s => `<option value="${s.id}" data-price="${s.default_price}">${e(Layout.getName(s))}</option>`).join('');

    // Валюты
    const currencySelect = document.getElementById('paymentCurrency');
    currencySelect.innerHTML = currencies.map(c =>
        `<option value="${c.code}" data-rate="${c.rate_to_inr}">${c.code} (${c.symbol})</option>`
    ).join('');
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tabs .tab').forEach((el, i) => {
        el.classList.toggle('tab-active', ['info', 'services', 'payments', 'tasks', 'history'][i] === tab);
    });
    loadTabData();
}

function renderTab() {
    const container = document.getElementById('tabContent');
    let html = '';

    switch (currentTab) {
        case 'info':
            html = renderInfoTab();
            setTimeout(() => {
                loadManagerNotes();
                renderPlacement();
                renderDealMembers();
                loadSpiritualTeachers();
            }, 0);
            break;
        case 'services':
            html = renderServicesTab();
            break;
        case 'payments':
            html = renderPaymentsTab();
            break;
        case 'tasks':
            html = renderTasksTab();
            break;
        case 'history':
            html = renderHistoryTab();
            break;
    }

    container.innerHTML = `<div class="card-body">${html}</div>`;
}

function renderGuestHistory() {
    if (!guestHistory || guestHistory.length === 0) return '';

    const statusIcon = (s) => {
        if (s === 'completed') return '<span class="text-success">●</span>';
        if (s === 'cancelled') return '<span class="text-error">●</span>';
        if (s === 'lead') return '<span class="text-warning">●</span>';
        return '<span class="text-info">●</span>';
    };

    const rows = guestHistory.map(d => {
        const r = d.retreats;
        const rName = r ? e(Layout.getName(r)) : '—';
        const dates = r ? CrmUtils.formatDate(r.start_date) + ' — ' + CrmUtils.formatDate(r.end_date) : '';
        const statusText = t('crm_status_' + d.status) || d.status;
        const color = r?.color || '#6366f1';

        return `<div class="flex items-center gap-3 py-2.5 border-b border-base-200 last:border-0">
            ${statusIcon(d.status)}
            <span class="badge badge-sm whitespace-nowrap" style="background-color: ${color}; color: white; border: none;">${rName}</span>
            <span class="text-xs text-base-content/50">${dates}</span>
            <span class="text-xs ml-auto">${statusText}</span>
            <a href="deal.html?id=${d.id}" class="btn btn-ghost btn-xs text-primary">→</a>
        </div>`;
    }).join('');

    const completed = guestHistory.filter(d => d.status === 'completed').length;
    const subtitle = completed > 0
        ? `Был(а) ${completed} ${completed === 1 ? 'раз' : completed < 5 ? 'раза' : 'раз'}`
        : '';

    return `
        <div class="mt-6">
            <div class="flex items-center gap-3 mb-3">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-primary">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                    История гостя
                </h3>
                ${subtitle ? `<span class="badge badge-ghost badge-sm">${subtitle}</span>` : ''}
            </div>
            <div class="bg-base-200/50 rounded-xl p-4">
                ${rows}
            </div>
        </div>
    `;
}

function renderFinanceBlock() {
    const list = document.getElementById('financePaymentsList');
    if (!list) return;

    const totalInr = payments.reduce((sum, p) => sum + Number(p.amount_inr || 0), 0);

    if (payments.length === 0) {
        list.innerHTML = '<p class="text-base-content/40 text-xs text-center py-2">Нет платежей</p>';
    } else {
        list.innerHTML = payments.map(p => {
            const dateStr = p.received_at
                ? new Date(p.received_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })
                : '—';
            const typeLabel = t('crm_payment_type_' + p.payment_type) || p.payment_type || '';
            return `
                <div class="group py-0.5 cursor-pointer hover:bg-base-200 rounded px-1 -mx-1" onclick="showPaymentDetails('${p.id}')">
                    <div class="flex items-center gap-1.5 text-xs">
                        <span class="text-base-content/50 w-14 shrink-0">${e(dateStr)}</span>
                        <span class="text-base-content/60 flex-1 truncate">${e(typeLabel)}</span>
                        <span class="font-mono">${CrmUtils.formatMoney(p.amount, p.currency)}</span>
                        <span class="text-base-content/30">→</span>
                        <span class="font-mono font-semibold">${CrmUtils.formatMoney(p.amount_inr)}</span>
                        <button class="btn btn-ghost btn-xs text-error h-5 min-h-5 px-1 opacity-0 group-hover:opacity-100" onclick="event.stopPropagation(); deletePayment('${p.id}')">×</button>
                    </div>
                    ${p.notes ? `<div class="text-xs text-base-content/40 pl-14 truncate">${e(p.notes)}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    // Итого оплачено (в рупиях)
    document.getElementById('financePaid').textContent = CrmUtils.formatMoney(totalInr);

    // Начислено и баланс
    const charged = deal ? (deal.total_charged || 0) : 0;
    const dealCurrency = deal?.currency || 'INR';
    document.getElementById('financeCharged').textContent = charged > 0 ? CrmUtils.formatMoney(charged, dealCurrency) : '—';

    const balanceEl = document.getElementById('financeBalance');
    if (charged > 0) {
        const balance = charged - totalInr;
        if (balance > 0) {
            balanceEl.textContent = '−' + CrmUtils.formatMoney(balance);
            balanceEl.className = 'font-mono text-rose-600';
        } else if (balance < 0) {
            balanceEl.textContent = '+' + CrmUtils.formatMoney(Math.abs(balance));
            balanceEl.className = 'font-mono text-sky-600';
        } else {
            balanceEl.textContent = CrmUtils.formatMoney(0);
            balanceEl.className = 'font-mono text-emerald-600';
        }
    } else {
        balanceEl.textContent = '—';
        balanceEl.className = 'font-mono text-base-content/40';
    }
}

async function changeStatus(newStatus) {
    if (newStatus === deal.status) return;

    const { error } = await Layout.db
        .from('crm_deals')
        .update({
            status: newStatus,
            first_contacted_at: deal.first_contacted_at || (newStatus === 'working' ? new Date().toISOString() : null),
            last_contacted_at: new Date().toISOString()
        })
        .eq('id', dealId);

    if (error) {
        Layout.handleError(error, 'Изменение статуса');
        return;
    }

    deal.status = newStatus;

    // Обновляем плашку статуса
    const statusColor = CrmUtils.STATUS_COLORS[newStatus] || '#6b7280';
    const statusSvg = CrmUtils.STATUS_SVG_ICONS[newStatus] || '';
    const statusName = t('crm_status_' + newStatus) || newStatus;
    document.getElementById('dealStatusBanner').style.backgroundColor = statusColor;
    // statusIcon и statusName теперь в select баннера

    Layout.showNotification('Статус изменён', 'success');
}

async function changeWorkMode(mode) {
    const { error } = await Layout.db.from('crm_deals').update({ work_mode: mode }).eq('id', dealId);
    if (error) Layout.handleError(error, 'Сохранение');
    else {
        deal.work_mode = mode;
        Layout.showNotification('Сохранено', 'success');
    }
}

async function changeManager(managerId) {
    const { error } = await Layout.db.from('crm_deals').update({ manager_id: managerId || null }).eq('id', dealId);
    if (error) Layout.handleError(error, 'Назначение менеджера');
    else {
        deal.manager_id = managerId;
        Layout.showNotification('Менеджер назначен', 'success');
    }
}

async function addTag(tagId) {
    if (!tagId) return;
    const { error } = await Layout.db.from('crm_deal_tags').insert({ deal_id: dealId, tag_id: tagId });
    if (error) Layout.handleError(error, 'Добавление тега');
    else {
        dealTags.push(tagId);
        renderTags();
    }
    document.getElementById('addTagSelect').value = '';
}

async function removeTag(tagId) {
    const { error } = await Layout.db.from('crm_deal_tags').delete().eq('deal_id', dealId).eq('tag_id', tagId);
    if (error) Layout.handleError(error, 'Удаление тега');
    else {
        dealTags = dealTags.filter(id => id !== tagId);
        renderTags();
    }
}

async function createGuestAccess() {
    if (!deal || !guest) return;

    // Проверяем, есть ли уже доступ
    if (guest.user_id) {
        Layout.showNotification('Доступ уже создан. Логин: ' + (guest.email || ''), 'warning');
        return;
    }

    if (!guest.email) {
        Layout.showNotification('У гостя не указан email — невозможно создать доступ', 'error');
        return;

async function cancelDeal() {
    const reasons = {
        changed_mind: 'Передумал',
        financial: 'Финансовые причины',
        visa: 'Проблемы с визой',
        health: 'Здоровье',
        rescheduled: 'Перенёс на другой ретрит',
        no_response: 'Не отвечает',
        other: 'Другое'
    };
    const reason = prompt(
        'Причина отмены:\n\n' +
        Object.entries(reasons).map(([k, v], i) => `${i+1}. ${v}`).join('\n') +
        '\n\nВведите номер (1-7):'
    );
    if (!reason) return;
    const keys = Object.keys(reasons);
    const idx = parseInt(reason) - 1;
    const reasonKey = (idx >= 0 && idx < keys.length) ? keys[idx] : 'other';

    await Layout.db.from('crm_deals').update({ cancellation_reason: reasonKey }).eq('id', dealId);
    deal.cancellation_reason = reasonKey;
    await changeStatus('cancelled');
    document.getElementById('cancelBtn').classList.add('hidden');
    document.getElementById('deleteBtn').classList.remove('hidden');
}

async function deleteDeal() {
    if (!confirm('Удалить сделку безвозвратно? Это действие нельзя отменить.')) return;

    try {
        // Удаляем связанные записи
        await Promise.all([
            Layout.db.from('crm_deal_services').delete().eq('deal_id', dealId),
            Layout.db.from('crm_payments').delete().eq('deal_id', dealId),
            Layout.db.from('crm_communications').delete().eq('deal_id', dealId),
            Layout.db.from('crm_tasks').delete().eq('deal_id', dealId),
            Layout.db.from('crm_deal_history').delete().eq('deal_id', dealId),
            Layout.db.from('crm_deal_members').delete().eq('deal_id', dealId),
        ]);

        // Удаляем теги сделки
        await Layout.db.from('crm_deal_tags').delete().eq('deal_id', dealId);

        // Удаляем саму сделку
        const { error } = await Layout.db.from('crm_deals').delete().eq('id', dealId);
        if (error) throw error;

        Layout.showNotification('Сделка удалена', 'success');
        window.location.href = 'deals.html';
    } catch (err) {
        Layout.handleError(err, 'Удаление сделки');
    }
}

// ==================== SERVICES ====================
function openServiceModal() {
    document.getElementById('editServiceId').value = '';
    document.getElementById('serviceSelect').value = '';
    document.getElementById('serviceDescription').value = '';
    document.getElementById('serviceQty').value = 1;
    document.getElementById('servicePrice').value = 0;
    document.getElementById('serviceTotal').value = 0;
    document.getElementById('customServiceDesc').classList.add('hidden');
    document.getElementById('addServiceModal').showModal();
}

function closeServiceModal() { document.getElementById('addServiceModal').close(); }

function onServiceSelect() {
    const select = document.getElementById('serviceSelect');
    const isCustom = select.value === 'custom';
    document.getElementById('customServiceDesc').classList.toggle('hidden', !isCustom);

    if (!isCustom && select.value) {
        const price = select.selectedOptions[0].dataset.price || 0;
        document.getElementById('servicePrice').value = price;
        calcServiceTotal();
    }
}

function calcServiceTotal() {
    const qty = parseFloat(document.getElementById('serviceQty').value) || 0;
    const price = parseFloat(document.getElementById('servicePrice').value) || 0;
    document.getElementById('serviceTotal').value = (qty * price).toFixed(2);
}

async function saveService(event) {
    event.preventDefault();
    const serviceId = document.getElementById('serviceSelect').value;
    const isCustom = serviceId === 'custom';

    const data = {
        deal_id: dealId,
        service_id: isCustom ? null : serviceId,
        description: isCustom ? document.getElementById('serviceDescription').value.trim() : null,
        quantity: parseFloat(document.getElementById('serviceQty').value),
        unit_price: parseFloat(document.getElementById('servicePrice').value),
        total_price: parseFloat(document.getElementById('serviceTotal').value)
    };

    const { error } = await Layout.db.from('crm_deal_services').insert(data);
    if (error) { Layout.handleError(error, 'Добавление услуги'); return; }

    Layout.showNotification('Услуга добавлена', 'success');
    closeServiceModal();
    await loadDealServices();
    counts.services++;
    updateTabCounts();
    renderTab();
    await refreshDeal();
}

async function deleteService(id) {
    if (!confirm('Удалить услугу?')) return;
    const { error } = await Layout.db.from('crm_deal_services').delete().eq('id', id);
    if (error) { Layout.handleError(error, 'Удаление'); return; }
    await loadDealServices();
    counts.services = Math.max(0, counts.services - 1);
    updateTabCounts();
    renderTab();
    await refreshDeal();
}

    document.getElementById('paymentDate').value = DateUtils.toISO(new Date());

    document.getElementById('paymentCurrency').value = 'INR';
    document.getElementById('paymentType').value = 'org_fee';
    document.getElementById('paymentMethod').value = 'cash';
    document.getElementById('paymentNotes').value = '';
    updatePaymentRate();
    document.getElementById('addPaymentModal').showModal();
}

function closePaymentModal() { document.getElementById('addPaymentModal').close(); }

function showPaymentDetails(id) {
    const p = payments.find(x => x.id === id);
    if (!p) return;

    const dateStr = p.received_at
        ? DateUtils.parseDate(p.received_at.slice(0, 10)).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
        : '—';
    const typeLabel = t('crm_payment_type_' + p.payment_type) || p.payment_type || '—';
    const methodLabel = t('crm_method_' + p.payment_method) || p.payment_method || '—';
    const receivedBy = p.received_by ? e(CrmUtils.getGuestShortName(p.received_by)) : '—';

    const rows = [
        ['Дата',          e(dateStr)],
        ['Сумма',         CrmUtils.formatMoney(p.amount, p.currency)],
        ['Курс',          `1 ${p.currency} = ${p.rate_to_inr} ₹`],
        ['В рупиях',      `<span class="font-bold">${CrmUtils.formatMoney(p.amount_inr)}</span>`],
        ['Тип',           e(typeLabel)],
        ['Способ',        e(methodLabel)],
        ['Принял',        receivedBy],
        ['Заметка',       p.notes ? `<span class="text-base-content/70">${e(p.notes)}</span>` : '<span class="text-base-content/30">—</span>'],
    ];

    document.getElementById('paymentDetailsContent').innerHTML = rows.map(([label, value]) => `
        <div class="flex justify-between items-start gap-3">
            <span class="text-sm text-base-content/50 shrink-0">${label}</span>
            <span class="text-sm text-right">${value}</span>
        </div>
    `).join('');

    const deleteBtn = document.getElementById('paymentDetailsDeleteBtn');
    deleteBtn.onclick = () => {
        document.getElementById('paymentDetailsModal').close();
        deletePayment(id);
    };

    document.getElementById('paymentDetailsModal').showModal();
}

function updatePaymentRate() {
    const select = document.getElementById('paymentCurrency');
    const rate = select.selectedOptions[0]?.dataset.rate || 1;
    const amount = parseFloat(document.getElementById('paymentAmount').value) || 0;
    document.getElementById('paymentRate').textContent = rate;
    document.getElementById('paymentInr').textContent = CrmUtils.formatMoney(amount * rate);
}

async function savePayment(event) {
    event.preventDefault();
    const currency = document.getElementById('paymentCurrency').value;
    const rate = parseFloat(document.getElementById('paymentCurrency').selectedOptions[0]?.dataset.rate) || 1;
    const amount = parseFloat(document.getElementById('paymentAmount').value);

    const paymentDate = document.getElementById('paymentDate').value;
    const data = {
        deal_id: dealId,
        amount: amount,
        currency: currency,
        rate_to_inr: rate,
        amount_inr: amount * rate,
        payment_type: document.getElementById('paymentType').value,
        payment_method: document.getElementById('paymentMethod').value,
        notes: document.getElementById('paymentNotes').value.trim() || null,
        received_by: window.currentUser?.vaishnava_id || null,
        received_at: paymentDate ? paymentDate + 'T12:00:00' : new Date().toISOString()
    };

    const { error } = await Layout.db.from('crm_payments').insert(data);
    if (error) { Layout.handleError(error, 'Добавление оплаты'); return; }

    Layout.showNotification('Оплата добавлена', 'success');
    closePaymentModal();
    await loadPayments(); // renderFinanceBlock() вызывается внутри
    counts.payments++;
    updateTabCounts();
    renderTab();
    await refreshDeal();
}

async function deletePayment(id) {
    if (!confirm('Удалить оплату?')) return;
    const { error } = await Layout.db.from('crm_payments').delete().eq('id', id);
    if (error) { Layout.handleError(error, 'Удаление'); return; }
    await loadPayments();
    counts.payments = Math.max(0, counts.payments - 1);
    updateTabCounts();
    renderTab();
    await refreshDeal();
}

function startEditContact(field, currentValue) {
    const container = document.getElementById('contact-val-' + field);
    if (!container) return;
    const input = document.createElement('input');
    input.type = field === 'email' ? 'email' : 'text';
    input.value = currentValue;
    input.className = 'input input-xs input-bordered w-full max-w-[200px]';
    input.placeholder = field === 'phone' ? '+7...' : field === 'email' ? 'email@...' : '@username';

    input.addEventListener('keydown', async (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); await saveContact(field, input.value); }

    container.innerHTML = '';
    container.appendChild(input);
    input.focus();
    input.select();
}

let placementData = null;
let bookingData = null;

async function loadPlacement() {
    if (!retreat) return;
    placementData = null;
    bookingData = null;

    // 1. Ищем resident по vaishnava_id
    if (guest) {
        const { data } = await Layout.db
            .from('residents')
            .select('id, check_in, check_out, status, room_id, booking_id, rooms(number, floor, buildings(name_ru, name_en, name_hi))')
            .eq('vaishnava_id', guest.id)
            .eq('retreat_id', retreat.id)
            .limit(1)
            .maybeSingle();
        placementData = data;
    }

    // 2. Если не нашли, ищем по deal.booking_id (бронь из CRM)
    if (!placementData && deal.booking_id) {
        const { data } = await Layout.db
            .from('residents')
            .select('id, check_in, check_out, status, room_id, booking_id, rooms(number, floor, buildings(name_ru, name_en, name_hi))')
            .eq('booking_id', deal.booking_id)
            .limit(1)
            .maybeSingle();
        placementData = data;

        if (placementData) {
            // Resident есть — грузим бронь для отображения деталей
            const { data: bData } = await Layout.db
                .from('bookings')
                .select('id, check_in, check_out, beds_count, notes, status')
                .eq('id', deal.booking_id)
                .maybeSingle();
            bookingData = bData;
        } else {
            // Resident удалён (например через шахматку) — чистим висячую бронь
            await Layout.db.from('bookings').delete().eq('id', deal.booking_id);
            await Layout.db.from('crm_deals')
                .update({ booking_id: null, room_id: null })
                .eq('id', dealId);
            deal.booking_id = null;
            deal.room_id    = null;
        }
    }

    renderPlacement();
}

        const buttons = [];
        if (canBook) {
            buttons.push(`<button type="button" class="btn btn-xs btn-primary gap-1" onclick="openRoomBookingModal()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                Забронировать номер
            </button>`);
        }
        if (!existingTask) {
            buttons.push(`<button type="button" class="btn btn-xs btn-outline" onclick="requestPlacement()">Запросить расселение</button>`);
        }

        if (existingTask && !canBook) {
            block.innerHTML = `
                <div class="text-sm text-warning mb-1">${label}</div>
                <div class="text-xs opacity-50">Запрос на расселение отправлен</div>
            `;
        } else {
            block.innerHTML = `
                <div class="text-sm opacity-60 mb-2">${label}</div>
                <div class="flex flex-wrap gap-2">${buttons.join('')}</div>
                ${existingTask ? '<div class="text-xs opacity-50 mt-1">Запрос на расселение уже отправлен</div>' : ''}
            `;
        }
    } else if (accom === 'partner_hotel') {
        block.innerHTML = `<div class="text-sm opacity-70">Другие гостиницы — уточните детали в заметках</div>`;
    } else if (accom === 'self') {
        block.innerHTML = `<div class="text-sm opacity-70">Самостоятельно</div>`;
    } else {
        block.innerHTML = '<div class="text-sm text-gray-400">Не определено — уточните у гостя в чеклисте «Проживание»</div>';
    }
}

async function requestPlacement() {
    // Получаем менеджеров по расселению (роль placement_manager)
    // 1. Находим role_id
    const { data: roleData } = await Layout.db
        .from('roles')
        .select('id')
        .eq('code', 'placement_manager')
        .maybeSingle();

    let placementManagers = [];
    if (roleData) {
        // 2. Находим auth user_id с этой ролью
        const { data: roleUsers } = await Layout.db
            .from('user_roles')
            .select('user_id')
            .eq('role_id', roleData.id)
            .eq('is_active', true);

        if (roleUsers && roleUsers.length > 0) {
            const authIds = roleUsers.map(r => r.user_id);
            // 3. Находим vaishnavas по user_id (auth)
            const { data: vUsers } = await Layout.db
                .from('vaishnavas')
                .select('id, spiritual_name, first_name, user_id')
                .in('user_id', authIds);
            placementManagers = vUsers || [];
        }
    }

    if (placementManagers.length === 0) {
        Layout.showNotification('Нет менеджеров по расселению. Назначьте роль в настройках.', 'error');
        return;
    }

    // Если один менеджер — назначаем сразу, если несколько — показываем модалку
    let assigneeId;
    if (placementManagers.length === 1) {
        assigneeId = placementManagers[0].id;
    } else {
        // Модалка выбора
        const html = placementManagers.map(m => {
            const name = m.spiritual_name || m.first_name;
            return `<button class="btn btn-sm btn-outline w-full justify-start gap-2" onclick="confirmPlacement('${m.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                ${Layout.escapeHtml(name)}
            </button>`;
        }).join('');
        document.getElementById('placementModalBody').innerHTML = html;
        document.getElementById('placementModal').showModal();
        return; // confirmPlacement() продолжит
    }

    await createPlacementTask(assigneeId);
}

async function confirmPlacement(assigneeId) {
    document.getElementById('placementModal').close();
    await createPlacementTask(assigneeId);
}

async function createPlacementTask(assigneeId) {
    const guestName = CrmUtils.getGuestName(guest);
    const retreatName = Layout.getName(retreat);
    const title = `Расселить ${guestName} на ${retreatName}`;
    const parts = [];
    if (deal.checklist_accommodation === 'guest_house') parts.push('Проживание: Гостевой дом ШРСК');
    else if (deal.checklist_accommodation === 'staff_house') parts.push('Проживание: Служебные дома ШРСК');
    if (deal.roommate_preference) parts.push(`Хочет жить рядом с: ${deal.roommate_preference}`);
    if (deal.special_needs) parts.push(`Особые потребности: ${deal.special_needs}`);
    if (dealMembers.length > 0) parts.push(`Состав группы: ${dealMembers.map(m => m.name).join(', ')}`);

    let priority = 'normal';
    if (retreat?.start_date) {
        const start = new Date(retreat.start_date + 'T00:00:00');
        const daysLeft = (start - new Date()) / (1000 * 60 * 60 * 24);
        if (daysLeft < 7) priority = 'high';
    }

    // Проверяем нет ли уже такой задачи
    const { data: existing } = await Layout.db
        .from('crm_tasks')
        .select('id')
        .eq('deal_id', dealId)
        .like('title', 'Расселить%')
        .is('completed_at', null)
        .maybeSingle();

    if (existing) {
        Layout.showNotification('Запрос на расселение уже создан', 'warning');
        return;
    }

    const { error } = await Layout.db.from('crm_tasks').insert({
        deal_id: dealId,
        title,
        description: parts.join('\n') || null,
        priority,
        assignee_id: assigneeId,
        created_by: window.currentUser?.vaishnava_id || null
    });

    if (error) {
        Layout.showNotification('Ошибка создания запроса', 'error');
        return;
    }

    Layout.showNotification('Запрос на расселение создан', 'success');
    await loadCounts();
    updateTabCounts();
}

// Слушаем сообщение от iframe после успешного бронирования
window.addEventListener('message', async (event) => {
    if (event.data?.type !== 'crm_booking_saved') return;
    document.getElementById('roomBookingIframeModal').close();
    document.getElementById('roomBookingIframe').src = '';
    deal.booking_id = event.data.booking_id;
    deal.room_id    = event.data.room_id;
    Layout.showNotification('Номер успешно забронирован', 'success');

function openRoomBookingModal() {
    const accom = deal.checklist_accommodation;
    let buildingIds = '';
    if (accom === 'guest_house') {
        buildingIds = BUILDING_GUEST_HOUSE;
    } else if (accom === 'staff_house') {
        buildingIds = BUILDING_STAFF_IDS.join(',');
    }

    // Количество мест: основной гость + участники группы
    const bedsCount = 1 + dealMembers.length;

    // Имена участников (для отображения в форме)
    const memberNames = dealMembers.map(m => m.name).join(', ');

    const params = new URLSearchParams({
        crm_deal_id:   dealId,
        check_in:      retreat?.start_date || '',
        check_out:     retreat?.end_date   || '',
        retreat_id:    retreat?.id         || '',
        contact_name:  CrmUtils.getGuestName(guest)      || '',
        contact_phone: guest?.phone || deal?.phone        || '',
        contact_email: guest?.email || deal?.email        || '',
        building_ids:  buildingIds,
        beds_count:    bedsCount,
        member_names:  memberNames,
    });

    const iframe = document.getElementById('roomBookingIframe');
    iframe.src = `../placement/bookings.html?${params.toString()}`;
    document.getElementById('roomBookingIframeModal').showModal();
}

async function cancelRoomBooking() {
    if (!deal.booking_id) return;
    if (!confirm('Отменить бронирование номера? Запись будет удалена.')) return;

    try {
        // Удаляем resident-заглушки
        await Layout.db.from('residents').delete().eq('booking_id', deal.booking_id);
        // Удаляем бронь
        await Layout.db.from('bookings').delete().eq('id', deal.booking_id);
        // Очищаем поля в сделке
        await Layout.db.from('crm_deals')
            .update({ booking_id: null, room_id: null })
            .eq('id', dealId);

        deal.booking_id = null;
        deal.room_id = null;

        Layout.showNotification('Бронирование отменено', 'success');
        await loadPlacement();
        if (currentTab === 'history') { await loadHistory(); renderTab(); }
    } catch (err) {
        Layout.handleError(err, 'Отмена брони');
    }
}

let spiritualTeachersList = [];

async function loadSpiritualTeachers() {
    if (spiritualTeachersList.length > 0) return;
    const { data } = await Layout.db
        .from('spiritual_teachers')
        .select('name_ru, name_en')
        .order('sort_order');

        spiritualTeachersList = data.map(t => t.name_ru);

}

function searchGuruSuggestions(query) {
    const suggestionsEl = document.getElementById('guruSuggestions');
    if (!suggestionsEl) return;

    if (!query || query.length < 1) {
        // Показать все при фокусе
        if (spiritualTeachersList.length > 0) {
            suggestionsEl.innerHTML = spiritualTeachersList.map(t =>
                `<div class="px-3 py-1.5 hover:bg-base-200 cursor-pointer" onclick="selectGuru('${Layout.escapeHtml(t)}')">${Layout.escapeHtml(t)}</div>`
            ).join('');
            suggestionsEl.classList.remove('hidden');
        }
        return;
    }

    const q = query.toLowerCase();
    const matches = spiritualTeachersList.filter(t => t.toLowerCase().includes(q)).slice(0, 8);
    if (matches.length === 0) {
        suggestionsEl.classList.add('hidden');
        return;
    }
    suggestionsEl.innerHTML = matches.map(t =>
        `<div class="px-3 py-1.5 hover:bg-base-200 cursor-pointer" onclick="selectGuru('${Layout.escapeHtml(t)}')">${Layout.escapeHtml(t)}</div>`
    ).join('');
    suggestionsEl.classList.remove('hidden');
}

function selectGuru(name) {
    document.getElementById('guruName').value = name;
    document.getElementById('guruSuggestions').classList.add('hidden');
    saveGuruName(name);
}

// ==================== ЧЕКЛИСТ ГОСТЯ ====================
function renderChecklist() {
    if (!deal) return;
    const fields = ['accommodation', 'meals', 'visa', 'tickets'];
    let filled = 0;
    fields.forEach(f => {
        const el = document.getElementById('cl_' + f);
        if (el) {
            const val = deal['checklist_' + f] || 'unknown';
            el.value = val;
            if (val !== 'unknown') filled++;

            // Цветная точка рядом с лейблом
            const label = el.closest('.form-control')?.querySelector('.label-text');
            if (label) {
                const dot = label.querySelector('.cl-dot') || (() => {
                    const d = document.createElement('span');
                    d.className = 'cl-dot inline-block w-2 h-2 rounded-full ml-1';
                    label.appendChild(d);
                    return d;
                })();
                dot.style.backgroundColor = val === 'unknown' ? '#d1d5db' : '#10b981';
            }
        }
    });

    // Фон карточки: красный → жёлтый → зелёный
    const card = document.getElementById('checklistCard');
    const title = document.getElementById('checklistTitle');
    if (card) {
        const ratio = filled / fields.length;
        if (ratio === 0) {
            card.style.backgroundColor = '#fef2f2'; // red-50
            if (title) title.style.color = '#991b1b'; // red-800
        } else if (ratio < 0.5) {
            card.style.backgroundColor = '#fef3c7'; // amber-100
            if (title) title.style.color = '#92400e'; // amber-800
        } else if (ratio < 1) {
            card.style.backgroundColor = '#ecfdf5'; // emerald-50
            if (title) title.style.color = '#065f46'; // emerald-800
        } else {
            card.style.backgroundColor = '#d1fae5'; // emerald-100
            if (title) title.style.color = '#065f46';
        }
    }

    // Показать/скрыть поля рейсов
    renderFlightData();

    // Индикатор готовности
    const readiness = document.getElementById('checklistReadiness');
    if (readiness) {
        readiness.textContent = `${filled} из ${fields.length}`;
        readiness.className = filled === fields.length
            ? 'mt-2 text-xs text-center font-semibold'
            : 'mt-2 text-xs text-center opacity-60';
    }
}

async function updateChecklist(field, value) {
    await Layout.db.from('crm_deals').update({ [field]: value }).eq('id', dealId);
    deal[field] = value;
    renderChecklist();
    // Обновить зависимые блоки
    if (field === 'checklist_accommodation') {
        // Если убрали проживание в ШРСК — удалить незавершённую задачу на расселение
        if (value !== 'guest_house' && value !== 'staff_house') {
            await Layout.db
                .from('crm_tasks')
                .delete()
                .eq('deal_id', dealId)
                .like('title', 'Расселить%')
                .is('completed_at', null);
        }
        renderPlacement();
    }
}

// ==================== ДАННЫЕ РЕЙСОВ ====================
function renderFlightData() {
    if (!deal) return;

    const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
    const setChecked = (id, val) => { const el = document.getElementById(id); if (el) el.checked = val; };

    // Показать/скрыть блок рейсов по «Билеты = Куплены»
    const ticketsBought = deal.checklist_tickets === 'bought';
    const block = document.getElementById('flightFieldsBlock');
    if (block) block.classList.toggle('hidden', !ticketsBought);

    // Заполнить значения
    setVal('arrivalFlight', deal.arrival_flight || '');
    setVal('arrivalAirport', deal.arrival_airport || '');
    if (deal.arrival_datetime) setVal('arrivalDatetime', deal.arrival_datetime.slice(0, 16));
    setChecked('arrivalEarlyCheckin', deal.arrival_early_checkin || false);
    setChecked('arrivalNeedsTransfer', deal.checklist_transfer_arrival === 'needed');

    setVal('departureFlight', deal.departure_flight || '');
    setVal('departureAirport', deal.departure_airport || '');
    if (deal.departure_datetime) setVal('departureDatetime', deal.departure_datetime.slice(0, 16));
    setChecked('departureLateCheckout', deal.departure_late_checkout || false);
    setChecked('departureNeedsTransfer', deal.checklist_transfer_departure === 'needed');
}

// updateArrivalType и updateDepartureType убраны — рейсы управляются через чеклист

async function saveFlightField(field, value) {
    await Layout.db.from('crm_deals').update({ [field]: value }).eq('id', dealId);
    deal[field] = value;
}

async function saveArrivalDatetime(value) {
    await Layout.db.from('crm_deals').update({ arrival_datetime: value || null }).eq('id', dealId);
    deal.arrival_datetime = value;
    // Авто-расчёт раннего заезда
    if (value) {
        const dt = new Date(value);
        const arrType = deal.arrival_type || 'flight';
        let arrivalAtAshram;
        if (arrType === 'flight') {
            arrivalAtAshram = new Date(dt.getTime() + 4 * 60 * 60 * 1000); // +4 часа
        } else {
            arrivalAtAshram = dt;
        }
        const earlyCheckin = arrivalAtAshram.getHours() < 10;
        document.getElementById('arrivalEarlyCheckin').checked = earlyCheckin;
        await saveFlightField('arrival_early_checkin', earlyCheckin);

        // Автосвязь: рейс заполнен → чеклист трансфер прибытие = «нужен»
        if (deal.checklist_transfer_arrival === 'unknown') {
            await updateChecklist('checklist_transfer_arrival', 'needed');
        }
    }
}

async function saveDepartureDatetime(value) {
    await Layout.db.from('crm_deals').update({ departure_datetime: value || null }).eq('id', dealId);
    deal.departure_datetime = value;
    // Авто-расчёт позднего выезда
    if (value) {
        const dt = new Date(value);
        const depType = deal.departure_type || 'flight';
        let departureFromAshram;
        if (depType === 'flight') {
            departureFromAshram = new Date(dt.getTime() - 6 * 60 * 60 * 1000); // -6 часов
        } else {
            departureFromAshram = dt;
        }
        const lateCheckout = departureFromAshram.getHours() >= 13;
        document.getElementById('departureLateCheckout').checked = lateCheckout;
        await saveFlightField('departure_late_checkout', lateCheckout);

        // Автосвязь: рейс заполнен → чеклист трансфер отъезд = «нужен»
        if (deal.checklist_transfer_departure === 'unknown') {
            await updateChecklist('checklist_transfer_departure', 'needed');
        }
    }
}
