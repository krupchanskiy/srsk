<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <script src="../js/color-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="crm_deals_page_title">Все сделки — CRM — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { screens: { 'desktop': '1200px' } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .deal-row:hover { background-color: oklch(var(--b2)); cursor: pointer; }
        .overdue { border-left: 3px solid #ef4444; }
    </style>
</head>
<body class="bg-base-200 min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="container mx-auto px-4 py-6 flex-1">
    <!-- Заголовок и кнопка -->
    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <h1 class="text-2xl font-bold" data-i18n="nav_crm_deals">Все сделки</h1>
        <button class="btn btn-primary" onclick="openNewDealModal()" data-permission="edit_crm">
            + <span data-i18n="crm_add_deal">Новая сделка</span>
        </button>
    </div>

    <!-- Фильтры -->
    <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body p-4">
            <div class="flex flex-wrap gap-3 items-end">
                <!-- Ретрит -->
                <div class="form-control">
                    <label class="label py-1"><span class="label-text text-xs" data-i18n="crm_retreat">Ретрит</span></label>
                    <select id="filterRetreat" class="select select-bordered select-sm" onchange="applyFilters()">
                        <option value="" data-i18n="all">Все</option>
                    </select>
                </div>

                <!-- Статус -->
                <div class="form-control">
                    <label class="label py-1"><span class="label-text text-xs" data-i18n="col_status">Статус</span></label>
                    <select id="filterStatus" class="select select-bordered select-sm" onchange="applyFilters()">
                        <option value="" data-i18n="all">Все</option>
                        <option value="active" data-i18n="crm_filter_active">Активные</option>
                        <option value="cancelled" data-i18n="crm_filter_cancelled">Отменённые</option>
                        <option value="completed" data-i18n="crm_filter_completed">Завершённые</option>
                    </select>
                </div>

                <!-- Менеджер -->
                <div class="form-control">
                    <label class="label py-1"><span class="label-text text-xs" data-i18n="crm_manager">Менеджер</span></label>
                    <select id="filterManager" class="select select-bordered select-sm" onchange="applyFilters()">
                        <option value="" data-i18n="all">Все</option>
                        <option value="my" data-i18n="crm_my">Мои</option>
                        <option value="unassigned" data-i18n="crm_unassigned">Не назначен</option>
                    </select>
                </div>

                <!-- Поиск -->
                <div class="form-control flex-1 min-w-[200px]">
                    <label class="label py-1"><span class="label-text text-xs" data-i18n="search">Поиск</span></label>
                    <input type="text" id="filterSearch" class="input input-bordered input-sm"
                           placeholder="Имя, телефон, email..." data-i18n-placeholder="crm_search_placeholder" oninput="applyFiltersDebounced()">
                </div>

                <!-- Сброс -->
                <button class="btn btn-ghost btn-sm" onclick="resetFilters()" data-i18n="reset">Сбросить</button>
            </div>
        </div>
    </div>

    <!-- Статистика + экспорт -->
    <div class="flex items-center justify-between mb-4">
        <div class="flex gap-4 text-sm">
            <span id="statsTotal" class="text-base-content/70">—</span>
            <span id="statsOverdue" class="text-error hidden">—</span>
        </div>
        <button class="btn btn-sm btn-outline gap-1" onclick="exportXlsx()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
            Скачать .xlsx
        </button>
    </div>

    <!-- Панель массовых действий -->
    <div id="bulkActions" class="alert bg-primary/10 mb-4 hidden">
        <span id="bulkCount" class="font-bold">0 выбрано</span>
        <div class="flex gap-2">
            <select id="bulkManager" class="select select-bordered select-sm">
                <option value="">Менеджер...</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="bulkAssignManager()">Назначить</button>
            <select id="bulkStatus" class="select select-bordered select-sm">
                <option value="">Статус...</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="bulkChangeStatus()">Сменить</button>
            <button class="btn btn-sm btn-error btn-outline" onclick="bulkDelete()">Удалить</button>
        </div>
    </div>

    <!-- Таблица -->
    <div class="card bg-base-100 shadow-sm">
        <div class="card-body p-0">
            <div class="overflow-x-auto">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="w-8"><input type="checkbox" class="checkbox checkbox-xs" onchange="toggleAllCheckboxes(this.checked)"></th>
                            <th class="w-8"></th>
                            <th class="cursor-pointer hover:bg-base-200" onclick="setSort('guest')">
                                <span class="inline-flex items-center gap-1" data-i18n="crm_guest">Гость <span id="sort-guest" class="text-xs opacity-50"></span></span>
                            </th>
                            <th class="cursor-pointer hover:bg-base-200" onclick="setSort('retreat')">
                                <span class="inline-flex items-center gap-1" data-i18n="crm_retreat">Ретрит <span id="sort-retreat" class="text-xs opacity-50"></span></span>
                            </th>
                            <th class="cursor-pointer hover:bg-base-200" onclick="setSort('status')">
                                <span class="inline-flex items-center gap-1" data-i18n="col_status">Статус <span id="sort-status" class="text-xs opacity-50"></span></span>
                            </th>
                            <th class="cursor-pointer hover:bg-base-200" onclick="setSort('manager')">
                                <span class="inline-flex items-center gap-1" data-i18n="crm_manager">Менеджер <span id="sort-manager" class="text-xs opacity-50"></span></span>
                            </th>
                            <th class="w-24 text-center"><span class="text-xs opacity-60">Чеклист</span></th>
                            <th class="cursor-pointer hover:bg-base-200 text-right" onclick="setSort('paid')">
                                <span class="inline-flex items-center gap-1 justify-end" data-i18n="crm_paid">Оплачено <span id="sort-paid" class="text-xs opacity-50"></span></span>
                            </th>
                            <th class="cursor-pointer hover:bg-base-200" onclick="setSort('created')">
                                <span class="inline-flex items-center gap-1" data-i18n="crm_created">Создано <span id="sort-created" class="text-xs opacity-50"></span></span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="dealsTable">
                        <tr><td colspan="9" class="text-center py-8">
                            <span class="loading loading-spinner loading-md"></span>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <div class="flex justify-center mt-4">
        <div class="join" id="pagination"></div>
    </div>
</main>

<div id="footer-placeholder"></div>

<!-- Модалка новой сделки -->
<dialog id="newDealModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4" data-i18n="crm_new_deal">Новая сделка</h3>
        <form id="newDealForm" onsubmit="createDeal(event)">
            <div class="form-control mb-3">
                <label class="label"><span class="label-text" data-i18n="crm_retreat_required">Ретрит *</span></label>
                <select id="newDealRetreat" class="select select-bordered" required onchange="loadNewDealManagers()">
                    <option value="" data-i18n="crm_select_retreat">Выберите ретрит...</option>
                </select>
            </div>

            <div class="form-control mb-3">
                <label class="label"><span class="label-text" data-i18n="crm_guest_required">Гость *</span></label>
                <div class="flex gap-2">
                    <div class="flex-1 relative">
                        <input type="text" id="newDealGuestSearch" class="input input-bordered w-full" placeholder="Поиск по имени или телефону..." autocomplete="off" oninput="filterGuestList(this.value)">
                        <input type="hidden" id="newDealGuest" value="">
                        <div id="guestDropdown" class="absolute z-50 w-full bg-base-100 shadow-lg rounded-box mt-1 max-h-48 overflow-y-auto hidden border border-base-300"></div>
                    </div>
                    <button type="button" class="btn btn-outline btn-primary btn-sm self-center" onclick="toggleNewGuestForm()" id="newGuestToggleBtn">+ Новый</button>
                </div>
            </div>

            <!-- Превью выбранного гостя -->
            <div id="selectedGuestPreview" class="hidden bg-base-200/70 rounded-lg p-3 mb-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="avatar placeholder">
                        <div class="bg-primary/10 text-primary rounded-full w-10 h-10">
                            <span id="previewInitials" class="text-sm font-bold"></span>
                        </div>
                    </div>
                    <div>
                        <div class="font-medium text-sm" id="previewName"></div>
                        <div class="text-xs text-base-content/50 flex gap-3">
                            <span id="previewPhone"></span>
                            <span id="previewEmail"></span>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-ghost btn-xs" onclick="clearSelectedGuest()">✕</button>
            </div>

            <!-- Форма нового гостя (скрыта по умолчанию) -->
            <div id="newGuestForm" class="hidden bg-base-200 p-3 rounded-lg mb-3 space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="newGuestFirstName" class="input input-bordered input-sm" placeholder="Имя" data-i18n-placeholder="crm_first_name">
                    <input type="text" id="newGuestLastName" class="input input-bordered input-sm" placeholder="Фамилия" data-i18n-placeholder="crm_last_name">
                </div>
                <input type="text" id="newGuestSpiritualName" class="input input-bordered input-sm w-full" placeholder="Духовное имя" data-i18n-placeholder="crm_spiritual_name">
                <div class="grid grid-cols-2 gap-2">
                    <input type="tel" id="newGuestPhone" class="input input-bordered input-sm" placeholder="Телефон" data-i18n-placeholder="crm_phone">
                    <input type="email" id="newGuestEmail" class="input input-bordered input-sm" placeholder="Email">
                </div>
            </div>

            <div class="form-control mb-3">
                <label class="label"><span class="label-text" data-i18n="crm_manager">Менеджер</span></label>
                <select id="newDealManager" class="select select-bordered">
                    <option value="">Не выбирать</option>
                </select>
            </div>

            <div class="form-control mb-3">
                <label class="label"><span class="label-text" data-i18n="crm_source">Источник</span></label>
                <select id="newDealSource" class="select select-bordered">
                    <option value="website" data-i18n="crm_source_website">Сайт</option>
                    <option value="telegram" data-i18n="crm_source_telegram">Телеграм</option>
                    <option value="referral" data-i18n="crm_source_referral">Рекомендация</option>
                    <option value="repeat" data-i18n="crm_source_repeat">Повторный гость</option>
                    <option value="portal" data-i18n="crm_source_portal">Личный кабинет</option>
                </select>
            </div>

            <div class="form-control mb-4">
                <label class="label"><span class="label-text" data-i18n="crm_notes">Заметки</span></label>
                <textarea id="newDealNotes" class="textarea textarea-bordered" rows="2"></textarea>
            </div>

            <div class="modal-action">
                <button type="button" class="btn" onclick="closeNewDealModal()" data-i18n="cancel">Отмена</button>
                <button type="submit" class="btn btn-primary" data-i18n="create">Создать</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script src="../js/config.js"></script>
<script src="../js/auth-check.js?v=4"></script>
<script src="../js/cache.js"></script>
<script src="../js/utils.js?v=2"></script>
<script src="../js/layout.js"></script>
<script src="../js/date-utils.js"></script>
<script src="../js/crm-utils.js"></script>

<script>
const t = key => Layout.t(key);
const e = str => Layout.escapeHtml(str);

// ==================== STATE ====================
let deals = [];
let retreats = [];
let guests = [];
let currentPage = 1;
const pageSize = 50;
let filteredDeals = [];
let debounceTimer = null;
let sortField = 'created';
let sortDir = 'desc';

// ==================== SORTING ====================
function setSort(field) {
    if (sortField === field) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
        sortField = field;
        sortDir = 'asc';
    }
    updateSortIndicators();
    sortDeals();
    currentPage = 1;
    renderTable();
    renderPagination();
}

function updateSortIndicators() {
    ['guest', 'retreat', 'status', 'manager', 'paid', 'created'].forEach(f => {
        const el = document.getElementById(`sort-${f}`);
        if (el) el.textContent = sortField === f ? (sortDir === 'asc' ? '↑' : '↓') : '';
    });
}

function sortDeals() {
    filteredDeals.sort((a, b) => {
        let aVal, bVal;

        switch (sortField) {
            case 'guest':
                aVal = CrmUtils.getGuestName(a.vaishnavas).toLowerCase();
                bVal = CrmUtils.getGuestName(b.vaishnavas).toLowerCase();
                break;
            case 'retreat':
                aVal = Layout.getName(a.retreats)?.toLowerCase() || '';
                bVal = Layout.getName(b.retreats)?.toLowerCase() || '';
                break;
            case 'status':
                aVal = a.status || '';
                bVal = b.status || '';
                break;
            case 'manager':
                aVal = a.manager ? CrmUtils.getGuestName(a.manager).toLowerCase() : '';
                bVal = b.manager ? CrmUtils.getGuestName(b.manager).toLowerCase() : '';
                // Пустые в конец
                if (!aVal && bVal) return 1;
                if (aVal && !bVal) return -1;
                break;
            case 'paid':
                aVal = a.total_paid || 0;
                bVal = b.total_paid || 0;
                break;
            case 'created':
            default:
                aVal = a.created_at || '';
                bVal = b.created_at || '';
                break;
        }

        if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
        if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
        return 0;
    });
}

// ==================== DATA ====================
async function loadData() {
    // Загружаем ретриты для фильтров
    const { data: retreatsData } = await Layout.db
        .from('retreats')
        .select('id, name_ru, name_en, color, start_date')
        .order('start_date', { ascending: false });
    retreats = retreatsData || [];

    // Заполняем select ретритов
    const retreatSelect = document.getElementById('filterRetreat');
    const newDealRetreatSelect = document.getElementById('newDealRetreat');

    retreats.forEach(r => {
        const opt = `<option value="${r.id}">${e(Layout.getName(r))}</option>`;
        retreatSelect.insertAdjacentHTML('beforeend', opt);
        newDealRetreatSelect.insertAdjacentHTML('beforeend', opt);
    });

    await loadDeals();
}

async function loadDeals() {
    const { data, error } = await Layout.db
        .from('crm_deals')
        .select(`
            *,
            vaishnavas:vaishnava_id(id, spiritual_name, first_name, last_name, phone, email),
            retreats:retreat_id(id, name_ru, name_en, color),
            manager:manager_id(id, spiritual_name, first_name, last_name)
        `)
        .order('created_at', { ascending: false });

    if (error) {
        Layout.handleError(error, 'Загрузка сделок');
        return;
    }

    deals = data || [];
    applyFilters();
}

async function loadGuests() {
    const { data } = await Layout.db
        .from('vaishnavas')
        .select('id, spiritual_name, first_name, last_name, phone, email')
        .eq('is_deleted', false)
        .order('spiritual_name');

    guests = data || [];

    // Гостевой поиск готов, данные в переменной guests
}

function filterGuestList(query) {
    const dropdown = document.getElementById('guestDropdown');
    const hiddenInput = document.getElementById('newDealGuest');
    const q = query.toLowerCase().trim();

    if (q.length < 2) {
        dropdown.classList.add('hidden');
        hiddenInput.value = '';
        return;
    }

    const matches = guests.filter(g => {
        const name = CrmUtils.getGuestName(g).toLowerCase();
        const phone = (g.phone || '').toLowerCase();
        const email = (g.email || '').toLowerCase();
        return name.includes(q) || phone.includes(q) || email.includes(q);
    }).slice(0, 15);

    if (matches.length === 0) {
        dropdown.innerHTML = '<div class="px-4 py-3 text-sm text-base-content/50">Не найден. Нажмите «+ Новый»</div>';
    } else {
        dropdown.innerHTML = matches.map(g => {
            const name = e(CrmUtils.getGuestName(g));
            const detail = g.phone || g.email || '';
            return `<div class="px-4 py-2 hover:bg-base-200 cursor-pointer flex justify-between items-center" onclick="selectGuest('${g.id}', '${e(CrmUtils.getGuestName(g))}')">
                <span class="font-medium">${name}</span>
                <span class="text-xs text-base-content/50">${e(detail)}</span>
            </div>`;
        }).join('');
    }
    dropdown.classList.remove('hidden');
}

function selectGuest(id, name) {
    document.getElementById('newDealGuest').value = id;
    document.getElementById('newDealGuestSearch').value = '';
    document.getElementById('newDealGuestSearch').classList.add('hidden');
    document.getElementById('newGuestToggleBtn').classList.add('hidden');
    document.getElementById('guestDropdown').classList.add('hidden');

    // Показываем превью
    const guest = guests.find(g => g.id === id);
    if (guest) {
        const fullName = [guest.spiritual_name, guest.first_name, guest.last_name].filter(Boolean).join(' ');
        const initials = ((guest.first_name || '')[0] || '') + ((guest.last_name || '')[0] || '');
        document.getElementById('previewName').textContent = fullName;
        document.getElementById('previewInitials').textContent = initials.toUpperCase() || '?';
        document.getElementById('previewPhone').textContent = guest.phone || '';
        document.getElementById('previewEmail').textContent = guest.email || '';
        document.getElementById('selectedGuestPreview').classList.remove('hidden');
    }
}

function clearSelectedGuest() {
    document.getElementById('newDealGuest').value = '';
    document.getElementById('newDealGuestSearch').value = '';
    document.getElementById('newDealGuestSearch').classList.remove('hidden');
    document.getElementById('newGuestToggleBtn').classList.remove('hidden');
    document.getElementById('selectedGuestPreview').classList.add('hidden');
    document.getElementById('newDealGuestSearch').focus();
}

// Закрытие дропдауна при клике вне
document.addEventListener('click', (ev) => {
    const dropdown = document.getElementById('guestDropdown');
    const search = document.getElementById('newDealGuestSearch');
    if (dropdown && !dropdown.contains(ev.target) && ev.target !== search) {
        dropdown.classList.add('hidden');
    }
});

// ==================== FILTERS ====================
function applyFilters() {
    const retreatId = document.getElementById('filterRetreat').value;
    const status = document.getElementById('filterStatus').value;
    const manager = document.getElementById('filterManager').value;
    const search = document.getElementById('filterSearch').value.toLowerCase().trim();

    const currentUserId = window.currentUser?.vaishnava_id;

    filteredDeals = deals.filter(d => {
        // Ретрит
        if (retreatId && d.retreat_id !== retreatId) return false;

        // Статус
        if (status === 'active' && (d.status === 'cancelled' || d.status === 'completed')) return false;
        if (status === 'cancelled' && d.status !== 'cancelled') return false;
        if (status === 'completed' && d.status !== 'completed') return false;

        // Менеджер
        if (manager === 'my' && d.manager_id !== currentUserId) return false;
        if (manager === 'unassigned' && d.manager_id) return false;

        // Поиск
        if (search) {
            const guest = d.vaishnavas;
            const searchStr = [
                guest?.spiritual_name,
                guest?.first_name,
                guest?.last_name,
                guest?.phone,
                guest?.email
            ].filter(Boolean).join(' ').toLowerCase();
            if (!searchStr.includes(search)) return false;
        }

        return true;
    });

    currentPage = 1;
    sortDeals();
    renderTable();
    renderStats();
    renderPagination();
    updateSortIndicators();
}

function applyFiltersDebounced() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(applyFilters, 300);
}

function resetFilters() {
    document.getElementById('filterRetreat').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterManager').value = '';
    document.getElementById('filterSearch').value = '';
    applyFilters();
}

// ==================== RENDER ====================
function renderTable() {
    const tbody = document.getElementById('dealsTable');
    const start = (currentPage - 1) * pageSize;
    const pageDeals = filteredDeals.slice(start, start + pageSize);

    if (pageDeals.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-8 text-base-content/50">
            ${t('crm_no_deals') || 'Нет сделок'}
        </td></tr>`;
        return;
    }

    tbody.innerHTML = pageDeals.map(d => {
        const guest = d.vaishnavas;
        const retreat = d.retreats;
        const manager = d.manager;
        const isOverdue = CrmUtils.isOverdue(d);

        return `
            <tr class="deal-row ${isOverdue ? 'overdue' : ''}" onclick="openDeal('${d.id}')">
                <td onclick="event.stopPropagation()"><input type="checkbox" class="checkbox checkbox-xs deal-checkbox" data-id="${d.id}" onchange="updateBulkPanel()"></td>
                <td class="w-8">${isOverdue ? `<span title="Без контакта > 24ч" class="text-error">${CrmUtils.UI_ICONS.exclamationCircle}</span>` : ''}${d.is_group_main ? `<span title="Главный в группе">${CrmUtils.UI_ICONS.user}</span>` : ''}</td>
                <td>
                    <div class="font-medium">${e(CrmUtils.getGuestName(guest))}</div>
                    <div class="text-xs text-base-content/50">${e(guest?.phone || guest?.email || '')}</div>
                </td>
                <td>
                    <span class="badge badge-sm whitespace-nowrap" style="background-color: ${retreat?.color || '#6b7280'}; color: white;">
                        ${e(Layout.getName(retreat) || '—')}
                    </span>
                </td>
                <td>${CrmUtils.getStatusBadge(d.status)}</td>
                <td class="text-sm">${manager ? e(CrmUtils.getGuestShortName(manager)) : '<span class="text-base-content/30">—</span>'}</td>
                <td class="text-center text-xs">${renderChecklistDots(d)}</td>
                <td class="text-right font-mono text-sm">
                    ${d.total_paid > 0 ? CrmUtils.formatMoney(d.total_paid) : '<span class="text-base-content/30">—</span>'}
                </td>
                <td class="text-sm text-base-content/50">${CrmUtils.formatDate(d.created_at)}</td>
            </tr>
        `;
    }).join('');
}

function renderChecklistDots(d) {
    const fields = ['checklist_accommodation', 'checklist_meals', 'checklist_transfer_arrival', 'checklist_transfer_departure', 'checklist_visa', 'checklist_tickets'];
    const dots = fields.map(f => {
        const v = d[f] || 'unknown';
        return v === 'unknown'
            ? '<span class="inline-block w-2 h-2 rounded-full bg-base-300" title="Не выяснено"></span>'
            : '<span class="inline-block w-2 h-2 rounded-full bg-success" title="Заполнено"></span>';
    });
    return dots.join(' ');
}

function renderStats() {
    const total = filteredDeals.length;
    const overdue = filteredDeals.filter(d => CrmUtils.isOverdue(d)).length;

    document.getElementById('statsTotal').textContent = `Найдено: ${total}`;

    const overdueEl = document.getElementById('statsOverdue');
    if (overdue > 0) {
        overdueEl.innerHTML = `<span class="inline-flex items-center gap-1"><span class="text-error">${CrmUtils.UI_ICONS.exclamationCircle}</span> Без контакта: ${overdue}</span>`;
        overdueEl.classList.remove('hidden');
    } else {
        overdueEl.classList.add('hidden');
    }
}

function renderPagination() {
    const totalPages = Math.ceil(filteredDeals.length / pageSize);
    const container = document.getElementById('pagination');

    if (totalPages <= 1) {
        container.innerHTML = '';
        return;
    }

    let html = '';
    for (let i = 1; i <= totalPages; i++) {
        html += `<button class="join-item btn btn-sm ${i === currentPage ? 'btn-active' : ''}"
                         onclick="goToPage(${i})">${i}</button>`;
    }
    container.innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    renderTable();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== ACTIONS ====================
function openDeal(id) {
    window.location.href = `deal.html?id=${id}`;
}

async function loadNewDealManagers() {
    const retreatId = document.getElementById('newDealRetreat').value;
    const select = document.getElementById('newDealManager');
    select.innerHTML = '<option value="">Не выбирать</option>';
    if (!retreatId) return;

    const { data } = await Layout.db
        .from('crm_retreat_managers')
        .select('manager_id, vaishnavas!inner(id, spiritual_name, first_name, last_name)')
        .eq('retreat_id', retreatId)
        .eq('is_active', true);

    if (data && data.length > 0) {
        // Есть назначенные менеджеры для этого ретрита
        data.forEach(m => {
            const v = m.vaishnavas;
            const name = v.spiritual_name || `${v.first_name || ''} ${v.last_name || ''}`.trim();
            select.insertAdjacentHTML('beforeend',
                `<option value="${m.manager_id}">${e(name)}</option>`
            );
        });
    } else {
        // Фоллбэк: показываем всех вайшнавов с аккаунтом
        const { data: allManagers } = await Layout.db
            .from('vaishnavas')
            .select('id, spiritual_name, first_name, last_name')
            .not('user_id', 'is', null)
            .order('spiritual_name');

        (allManagers || []).forEach(v => {
            const name = v.spiritual_name || `${v.first_name || ''} ${v.last_name || ''}`.trim();
            select.insertAdjacentHTML('beforeend',
                `<option value="${v.id}">${e(name)}</option>`
            );
        });
    }
}

function openNewDealModal() {
    document.getElementById('newDealForm').reset();
    document.getElementById('newGuestForm').classList.add('hidden');
    document.getElementById('newDealManager').innerHTML = '<option value="">Не выбирать</option>';
    loadGuests();
    document.getElementById('newDealModal').showModal();
}

function closeNewDealModal() {
    document.getElementById('newDealModal').close();
}

function toggleNewGuestForm() {
    const form = document.getElementById('newGuestForm');
    const searchInput = document.getElementById('newDealGuestSearch');
    const hiddenInput = document.getElementById('newDealGuest');
    const btn = document.getElementById('newGuestToggleBtn');

    if (form.classList.contains('hidden')) {
        form.classList.remove('hidden');
        searchInput.disabled = true;
        searchInput.value = '';
        hiddenInput.value = 'new';
        btn.textContent = '← Выбрать';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-ghost');
        document.getElementById('guestDropdown').classList.add('hidden');
    } else {
        form.classList.add('hidden');
        searchInput.disabled = false;
        hiddenInput.value = '';
        btn.textContent = '+ Новый';
        btn.classList.add('btn-primary');
        btn.classList.remove('btn-ghost');
    }
}

async function createDeal(event) {
    event.preventDefault();

    const retreatId = document.getElementById('newDealRetreat').value;
    let guestId = document.getElementById('newDealGuest').value;

    if (!retreatId) {
        Layout.showNotification('Выберите ретрит', 'error');
        return;
    }

    // Создаём нового гостя если нужно
    if (!guestId || guestId === 'new') {
        const firstName = document.getElementById('newGuestFirstName').value.trim();
        const lastName = document.getElementById('newGuestLastName').value.trim();
        const spiritualName = document.getElementById('newGuestSpiritualName').value.trim();
        const phone = document.getElementById('newGuestPhone').value.trim();
        const email = document.getElementById('newGuestEmail').value.trim();

        if (!firstName && !spiritualName) {
            Layout.showNotification('Укажите имя или духовное имя гостя', 'error');
            return;
        }

        const { data: newGuest, error: guestError } = await Layout.db
            .from('vaishnavas')
            .insert({
                first_name: firstName || null,
                last_name: lastName || null,
                spiritual_name: spiritualName || null,
                phone: phone || null,
                email: email || null
            })
            .select('id')
            .single();

        if (guestError) {
            Layout.handleError(guestError, 'Создание гостя');
            return;
        }

        guestId = newGuest.id;
    }

    // Создаём сделку
    const selectedManagerId = document.getElementById('newDealManager').value || null;
    const dealData = {
        retreat_id: retreatId,
        vaishnava_id: guestId,
        source: document.getElementById('newDealSource').value,
        notes: document.getElementById('newDealNotes').value.trim() || null,
        status: 'lead',
        manager_id: selectedManagerId || null,
    };

    const { data: newDeal, error: dealError } = await Layout.db
        .from('crm_deals')
        .insert(dealData)
        .select('id')
        .single();

    if (dealError) {
        Layout.handleError(dealError, 'Создание сделки');
        return;
    }

    Layout.showNotification('Сделка создана', 'success');
    closeNewDealModal();

    // Открываем карточку сделки
    window.location.href = `deal.html?id=${newDeal.id}`;
}

// ==================== МАССОВЫЕ ДЕЙСТВИЯ ====================
function getSelectedIds() {
    return [...document.querySelectorAll('.deal-checkbox:checked')].map(cb => cb.dataset.id);
}

function toggleAllCheckboxes(checked) {
    document.querySelectorAll('.deal-checkbox').forEach(cb => cb.checked = checked);
    updateBulkPanel();
}

function updateBulkPanel() {
    const ids = getSelectedIds();
    const panel = document.getElementById('bulkActions');
    if (ids.length > 0) {
        panel.classList.remove('hidden');
        document.getElementById('bulkCount').textContent = `${ids.length} выбрано`;
    } else {
        panel.classList.add('hidden');
    }
}

async function bulkAssignManager() {
    const ids = getSelectedIds();
    const managerId = document.getElementById('bulkManager').value;
    if (!managerId || ids.length === 0) return;
    for (const id of ids) {
        await Layout.db.from('crm_deals').update({ manager_id: managerId }).eq('id', id);
    }
    Layout.showNotification(`Менеджер назначен для ${ids.length} сделок`, 'success');
    await loadDeals();
}

async function bulkChangeStatus() {
    const ids = getSelectedIds();
    const status = document.getElementById('bulkStatus').value;
    if (!status || ids.length === 0) return;
    for (const id of ids) {
        await Layout.db.from('crm_deals').update({ status }).eq('id', id);
    }
    Layout.showNotification(`Статус изменён для ${ids.length} сделок`, 'success');
    await loadDeals();
}

async function bulkDelete() {
    const ids = getSelectedIds();
    const cancelledIds = ids.filter(id => {
        const d = deals.find(dd => dd.id === id);
        return d && d.status === 'cancelled';
    });
    if (cancelledIds.length === 0) {
        Layout.showNotification('Удалять можно только отменённые сделки', 'error');
        return;
    }
    if (!confirm(`Удалить ${cancelledIds.length} отменённых сделок?`)) return;
    for (const id of cancelledIds) {
        await Layout.db.from('crm_deal_services').delete().eq('deal_id', id);
        await Layout.db.from('crm_payments').delete().eq('deal_id', id);
        await Layout.db.from('crm_communications').delete().eq('deal_id', id);
        await Layout.db.from('crm_tasks').delete().eq('deal_id', id);
        await Layout.db.from('crm_deal_history').delete().eq('deal_id', id);
        await Layout.db.from('crm_deal_members').delete().eq('deal_id', id);
        await Layout.db.from('crm_deals').delete().eq('id', id);
    }
    Layout.showNotification(`Удалено ${cancelledIds.length} сделок`, 'success');
    await loadDeals();
}

// ==================== ЭКСПОРТ ====================
function exportXlsx() {
    const deals = filteredDeals;
    if (deals.length === 0) { Layout.showNotification('Нет данных для экспорта', 'error'); return; }

    // CSV с BOM для Excel
    const BOM = '\uFEFF';
    const headers = ['Имя', 'Телефон', 'Email', 'Telegram', 'Ретрит', 'Статус', 'Менеджер', 'Оплачено (₹)', 'Создано', 'Проживание', 'Питание', 'Виза', 'Билеты'];
    const rows = deals.map(d => {
        const g = d.vaishnavas;
        const r = d.retreats;
        const m = d.manager;
        const cl = (f) => { const v = d[f]; return v === 'unknown' ? '' : (v || ''); };
        return [
            CrmUtils.getGuestName(g),
            g?.phone || '',
            g?.email || '',
            g?.telegram || '',
            Layout.getName(r) || '',
            CrmUtils.getStatusLabel(d.status),
            m ? CrmUtils.getGuestShortName(m) : '',
            d.total_paid || 0,
            CrmUtils.formatDate(d.created_at),
            cl('checklist_accommodation'),
            cl('checklist_meals'),
            cl('checklist_visa'),
            cl('checklist_tickets')
        ];
    });

    const csv = BOM + [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `crm-deals-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function populateBulkSelects() {
    // Менеджеры — собираем из загруженных сделок (уникальные)
    const managerSelect = document.getElementById('bulkManager');
    if (managerSelect) {
        const seen = new Set();
        deals.forEach(d => {
            if (d.manager && !seen.has(d.manager.id)) {
                seen.add(d.manager.id);
                managerSelect.insertAdjacentHTML('beforeend',
                    `<option value="${d.manager.id}">${e(CrmUtils.getGuestShortName(d.manager))}</option>`
                );
            }
        });
    }
    // Статусы
    const statusSelect = document.getElementById('bulkStatus');
    if (statusSelect) {
        CrmUtils.STATUSES.forEach(s => {
            statusSelect.insertAdjacentHTML('beforeend',
                `<option value="${s}">${CrmUtils.getStatusLabel(s)}</option>`
            );
        });
    }
}

    await Layout.init({
        module: 'crm',
        menuId: 'crm_sales',
        itemId: 'crm_deals'
    });

    await loadData();
    populateBulkSelects();
}

init();
