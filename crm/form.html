<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка на ретрит — ШРСК</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen">

<div class="container mx-auto px-4 py-8 max-w-2xl">
    <!-- Логотип -->
    <div class="text-center mb-8">
        <img src="../img/logo.png" alt="ШРСК" class="h-16 mx-auto mb-4" onerror="this.style.display='none'">
        <h1 class="text-2xl font-bold text-gray-800" id="pageTitle">Заявка на ретрит</h1>
        <p id="retreatSubtitle" class="text-lg text-gray-600 mt-2 hidden"></p>
    </div>

    <!-- Форма -->
    <form id="applicationForm" class="card bg-white shadow-xl">
        <div class="card-body">
            <!-- Ретрит (скрытый, если передан в URL) -->
            <div id="retreatSelectBlock" class="form-control mb-6">
                <label class="label"><span class="label-text"><span>Ретрит</span> <span class="text-error">*</span></span></label>
                <select name="retreat_id" id="retreatSelect" class="select select-bordered" required>
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                Личные данные
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-control">
                    <label class="label"><span class="label-text"><span>Имя</span> <span class="text-error">*</span></span></label>
                    <input type="text" name="first_name" class="input input-bordered" required>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text">Фамилия <span class="text-error">*</span></span></label>
                    <input type="text" name="last_name" class="input input-bordered" required>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text">Духовное имя</span></label>
                    <input type="text" name="spiritual_name" class="input input-bordered"
                           placeholder="Если есть">
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text"><span>Email</span> <span class="text-error">*</span></span></label>
                    <input type="email" name="email" class="input input-bordered" required
                           placeholder="your@email.com">
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text"><span>Телефон</span> <span class="text-error">*</span></span></label>
                    <input type="tel" name="phone" class="input input-bordered"
                           placeholder="+7 999 123 45 67" required>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text">Telegram</span></label>
                    <input type="text" name="telegram" class="input input-bordered"
                           placeholder="@username">
                </div>
            </div>

            <div class="form-control mt-4">
                <label class="label"><span class="label-text">Сообщение для менеджеров</span></label>
                <textarea name="notes" class="textarea textarea-bordered" rows="3"
                          placeholder="Особые пожелания, вопросы..."></textarea>
            </div>

            <div class="flex justify-end mt-6">
                <button type="submit" class="btn btn-success gap-2" id="submitBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
                    Отправить заявку
                </button>
            </div>
        </div>
    </form>

    <!-- Сообщение об успехе -->
    <div id="successMessage" class="card bg-white shadow-xl hidden">
        <div class="card-body text-center py-12">
            <div class="text-success mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 mx-auto"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
            </div>
            <h2 class="text-2xl font-bold text-success mb-2">Заявка отправлена!</h2>
            <p class="text-base-content/70 mb-6">
                Мы свяжемся с вами в ближайшее время для подтверждения участия.
            </p>
            <div class="alert alert-info">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>Проверьте свой телефон — мы напишем в WhatsApp или Telegram</span>
            </div>
        </div>
    </div>

    <!-- Ошибка -->
    <div id="errorMessage" class="alert alert-error mt-4 hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span id="errorText"></span>
    </div>
</div>

<script src="../js/config.js?v=3"></script>
<script>
// ==================== I18N ====================
const LANG = new URLSearchParams(window.location.search).get('lang') === 'en' ? 'en' : 'ru';
const I18N = {
    ru: {
        page_title: 'Заявка на ретрит',
        personal_data: 'Личные данные',
        first_name: 'Имя', last_name: 'Фамилия', spiritual_name: 'Духовное имя',
        email: 'Email', phone: 'Телефон', telegram: 'Telegram',
        message: 'Сообщение для менеджеров', message_placeholder: 'Особые пожелания, вопросы...',
        sp_placeholder: 'Если есть',
        retreat: 'Ретрит', select_retreat: 'Выберите ретрит', loading: 'Загрузка...',
        submit: 'Отправить заявку', submitting: 'Отправка...',
        success_title: 'Спасибо за вашу заявку!',
        success_text: 'Скоро мы свяжемся с вами!',
        success_hint: 'Мы напишем вам в WhatsApp или Telegram',
        error_load: 'Не удалось загрузить список ретритов',
        error_submit: 'Произошла ошибка при отправке заявки. Попробуйте ещё раз.',
        error_duplicate: 'Вы уже подали заявку на этот ретрит. Если у вас есть вопросы, свяжитесь с нами.',
        required: '*'
    },
    en: {
        page_title: 'Retreat Registration',
        personal_data: 'Personal Information',
        first_name: 'First Name', last_name: 'Last Name', spiritual_name: 'Spiritual Name',
        email: 'Email', phone: 'Phone', telegram: 'Telegram',
        message: 'Message for managers', message_placeholder: 'Special requests, questions...',
        sp_placeholder: 'If applicable',
        retreat: 'Retreat', select_retreat: 'Select retreat', loading: 'Loading...',
        submit: 'Submit Application', submitting: 'Submitting...',
        success_title: 'Thank you for your application!',
        success_text: 'We will contact you soon!',
        success_hint: 'We will reach out via WhatsApp or Telegram',
        error_load: 'Failed to load retreat list',
        error_submit: 'An error occurred while submitting. Please try again.',
        error_duplicate: 'You have already applied for this retreat. Please contact us if you have questions.',
        required: '*'
    }
};
const T = I18N[LANG];

// Применяем переводы к статическим элементам
document.addEventListener('DOMContentLoaded', () => {
    document.documentElement.lang = LANG;
    document.title = T.page_title + ' — ШРСК';
    document.getElementById('pageTitle').textContent = T.page_title;

    // Лейблы форм
    const labels = {
        first_name: T.first_name, last_name: T.last_name, spiritual_name: T.spiritual_name,
        email: T.email, phone: T.phone, telegram: T.telegram
    };
    document.querySelectorAll('input[name], textarea[name]').forEach(el => {
        const name = el.getAttribute('name');
        const label = el.closest('.form-control')?.querySelector('.label-text');
        if (label && labels[name]) {
            const required = el.hasAttribute('required') ? ` <span class="text-error">${T.required}</span>` : '';
            label.innerHTML = `<span>${labels[name]}</span>${required}`;
        }
        if (name === 'spiritual_name') el.placeholder = T.sp_placeholder;
        if (name === 'notes') {
            el.placeholder = T.message_placeholder;
            const noteLabel = el.closest('.form-control')?.querySelector('.label-text');
            if (noteLabel) noteLabel.textContent = T.message;
        }
    });

    // Кнопка отправки
    document.getElementById('submitBtn').querySelector('svg').insertAdjacentHTML('afterend', ' ' + T.submit);

    // Ретрит лейбл
    const retreatLabel = document.getElementById('retreatSelectBlock')?.querySelector('.label-text');
    if (retreatLabel) retreatLabel.innerHTML = `<span>${T.retreat}</span> <span class="text-error">${T.required}</span>`;

    // Успех
    document.querySelector('#successMessage h2').textContent = T.success_title;
    document.querySelector('#successMessage p').textContent = T.success_text;
    document.querySelector('#successMessage .alert span').textContent = T.success_hint;
});
</script>
<script>
// ==================== SUPABASE ====================
const db = window.supabaseClient || supabase.createClient(
    window.CONFIG.SUPABASE_URL,
    window.CONFIG.SUPABASE_ANON_KEY
);

// ==================== STATE ====================
let retreats = [];
let urlParams = {};

// ==================== URL PARAMS ====================
function parseUrlParams() {
    const params = new URLSearchParams(window.location.search);
    urlParams = {
        retreat: params.get('retreat'),
        utm_source: params.get('utm_source'),
        utm_medium: params.get('utm_medium'),
        utm_campaign: params.get('utm_campaign'),
        utm_content: params.get('utm_content'),
        ref: params.get('ref')
    };
}

// ==================== DATA LOADING ====================
async function loadRetreats() {
    const today = new Date();
    const todayStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');

    const { data, error } = await db
        .from('retreats')
        .select('id, name_ru, name_en, slug, start_date, end_date, color')
        .gte('end_date', todayStr)
        .order('start_date', { ascending: true });

    if (error) {
        showError(T.error_load);
        return;
    }

    retreats = data || [];

    const select = document.getElementById('retreatSelect');
    select.innerHTML = `<option value="">${T.select_retreat}</option>`;

    retreats.forEach(r => {
        const dates = formatDateRange(r.start_date, r.end_date);
        const name = LANG === 'en' ? (r.name_en || r.name_ru) : r.name_ru;
        select.insertAdjacentHTML('beforeend',
            `<option value="${r.id}">${escapeHtml(name)} (${dates})</option>`
        );
    });

    // Выбираем ретрит из URL
    if (urlParams.retreat) {
        const retreat = retreats.find(r => r.slug === urlParams.retreat || r.id === urlParams.retreat);
        if (retreat) {
            select.value = retreat.id;
            // Показываем название ретрита и скрываем селект
            const subtitle = document.getElementById('retreatSubtitle');
            const dates = formatDateRange(retreat.start_date, retreat.end_date);
            subtitle.textContent = `${retreat.name_ru} (${dates})`;
            subtitle.classList.remove('hidden');
            document.getElementById('retreatSelectBlock').classList.add('hidden');
        }
    }
}

// ==================== FORM SUBMISSION ====================
async function submitForm(e) {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="loading loading-spinner loading-sm"></span> ${T.submitting}`;
    hideError();

    try {
        const form = document.getElementById('applicationForm');
        const formData = new FormData(form);

        // 1. Собираем данные гостя
        const guestData = {
            spiritual_name: formData.get('spiritual_name') || null,
            first_name: formData.get('first_name'),
            last_name: formData.get('last_name') || null,
            phone: normalizePhone(formData.get('phone')),
            email: formData.get('email') || null,
            telegram: formData.get('telegram') || null
        };

        // 2. Ищем или создаём гостя
        let vaishnavaId = await findOrCreateVaishnava(guestData);

        // 3. Получаем менеджера через round-robin
        const retreatId = formData.get('retreat_id');
        const managerId = await getNextManager(retreatId);

        const notes = formData.get('notes') || '';

        // Проверка на дубль (тот же гость + тот же ретрит)
        const { data: existingDeal } = await db
            .from('crm_deals')
            .select('id, status')
            .eq('vaishnava_id', vaishnavaId)
            .eq('retreat_id', retreatId)
            .neq('status', 'cancelled')
            .maybeSingle();

        if (existingDeal) {
            showError(T.error_duplicate);
            btn.disabled = false;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg> ${T.submit}`;
            return;
        }

        const dealData = {
            vaishnava_id: vaishnavaId,
            retreat_id: retreatId,
            manager_id: managerId,
            status: 'lead',
            source: urlParams.utm_source || 'website',
            notes: notes.trim() || null,
            utm_source: urlParams.utm_source || null,
            utm_medium: urlParams.utm_medium || null,
            utm_campaign: urlParams.utm_campaign || null,
            utm_content: urlParams.utm_content || null
        };

        // 4. Создаём сделку
        const { data: deal, error: dealError } = await db
            .from('crm_deals')
            .insert(dealData)
            .select('id')
            .single();

        if (dealError) throw dealError;

        // 5. Показываем успех
        document.getElementById('applicationForm').classList.add('hidden');
        document.getElementById('successMessage').classList.remove('hidden');
        document.getElementById('stepIndicators')?.classList.add('hidden');

    } catch (error) {
        console.error('Submit error:', error);
        showError(T.error_submit);
        btn.disabled = false;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg> Отправить заявку';
    }
}

async function findOrCreateVaishnava(data) {
    // 1. Ищем по телефону
    if (data.phone) {
        const { data: byPhone } = await db
            .from('vaishnavas')
            .select('id')
            .eq('phone', data.phone)
            .eq('is_deleted', false)
            .maybeSingle();

        if (byPhone) {
            await updateVaishnava(byPhone.id, data);
            return byPhone.id;
        }
    }

    // 2. Ищем по email
    if (data.email) {
        const { data: byEmail } = await db
            .from('vaishnavas')
            .select('id')
            .eq('email', data.email)
            .eq('is_deleted', false)
            .maybeSingle();

        if (byEmail) {
            await updateVaishnava(byEmail.id, data);
            return byEmail.id;
        }
    }

    // 3. Создаём нового
    const { data: created, error } = await db
        .from('vaishnavas')
        .insert({
            ...data,
            is_deleted: false
        })
        .select('id')
        .single();

    if (error) throw error;
    return created.id;
}

async function updateVaishnava(id, data) {
    const updates = {};
    if (data.spiritual_name) updates.spiritual_name = data.spiritual_name;
    if (data.last_name) updates.last_name = data.last_name;
    if (data.email) updates.email = data.email;
    if (data.phone) updates.phone = data.phone;
    if (data.telegram) updates.telegram = data.telegram;
    if (Object.keys(updates).length > 0) {
        await db.from('vaishnavas').update(updates).eq('id', id);
    }
}

async function getNextManager(retreatId) {
    // Round-robin через SECURITY DEFINER функцию:
    // - атомарно (FOR UPDATE SKIP LOCKED) — нет race condition между формами
    // - учитывает retreat_id (очередь менеджеров в БД раздельная для каждого ретрита)
    // - анон больше не имеет UPDATE на crm_manager_queue — дыра закрыта
    if (!retreatId) return null;
    const { data, error } = await db.rpc('assign_next_manager_for_retreat', {
        p_retreat_id: retreatId
    });
    if (error) {
        console.error('assign_next_manager_for_retreat error:', error);
        return null;
    }
    return data || null;
}

// ==================== HELPERS ====================
const MONTHS_RU = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];

function parseLocalDate(str) {
    const p = str.split('-');
    return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
}

function formatDateRange(start, end) {
    if (!start) return '';
    const s = parseLocalDate(start);
    const e = end ? parseLocalDate(end) : null;

    if (e && s.getMonth() === e.getMonth()) {
        return `${s.getDate()}–${e.getDate()} ${MONTHS_RU[s.getMonth()]}`;
    }
    if (e) {
        return `${s.getDate()} ${MONTHS_RU[s.getMonth()]} – ${e.getDate()} ${MONTHS_RU[e.getMonth()]}`;
    }
    return `${s.getDate()} ${MONTHS_RU[s.getMonth()]}`;
}

function normalizePhone(phone) {
    if (!phone) return null;
    return phone.replace(/[^\d+]/g, '');
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showError(message) {
    document.getElementById('errorText').textContent = message;
    document.getElementById('errorMessage').classList.remove('hidden');
}

function hideError() {
    document.getElementById('errorMessage').classList.add('hidden');
}

// ==================== INIT ====================
async function init() {
    parseUrlParams();
    await loadRetreats();
    document.getElementById('applicationForm').addEventListener('submit', submitForm);
}

init();
</script>

</body>
</html>
